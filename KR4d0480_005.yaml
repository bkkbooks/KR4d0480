body:
  text: 續軒渠集卷五元洪希文撰七言律詩上題學士趙子昻近帖天馬騰驤金褭蹏漢書禮樂志有天馬下漢武帝鑄金作馬蹏狀謂之金褭赤刀揮霍玉如泥詞頭已逼蘇内翰紙背欠題王會稽康定間富韓公為知制誥封還詞頭繳詞頭富公始軍栁子厚集有殷賢寄劉連州二首其下註云家有右書每紙背庾翼題云王會稽六帖墨帖楷書卑石鶴錦囊珍玩甚珠犀嗟予舊好應成癖過眼空憐五色迷唐李程試日五色賦先榜已落矣初出試塲楊於陵遇程詢其所試程示之破題云徳動天鑒祥開日華於陵覽之謂程曰公今日須作狀元書吕洞賔畫像劒飛岳鄂過蒼梧風骨昻藏美丈夫閑揖九陽供吐納飽餐六氣事嘘呼荘子刻意吹呴呼吸吐故納新熊經鳥伸此道引之士養形之人彭祖夀考之所好春食朝霞日始出赤黄氣夏食正陽南方日中氣秋食淪隂日沒後赤黄氣冬食沆瀣北方夜半氣并天地𤣥黄是為六氣見揚子明經當年得遂金閨籍謝眺出尚書省既通金閨籍金馬門也今日誰看野服圖笑引天風毛髪動可能隨我朗吟無於揚州石塔自畫像吹之毛髪盡動春夜對花月璧月瓊枝鬬好懐陳后主與諸貴人同狎客賦詩其畧云璧月夜夜滿瓊枝朝朝新互相誇張貴嬪容色之麗云爾攀花邀月下瑤臺娟娟夜色穿簾入冉冉天香撲袖来李正封牡丹國色朝酣酒天香夜染衣之句細酌微吟身自在行歌起舞影裵徊幸然等是無情物若是多情便可猜惜花陽艷亭臺手自栽精神擡舉待春回朝来不忍獨倚樹雨過那堪都委苔時不貸人如轉燭事多敗意且啣杯從来四美難并具雲合佳人殊未来江淹雜擬三十首有湯休上人詩云西北秋風至楚客思悠哉日暮碧雲合佳人殊未来東牕小酌烏馭西沈兔魄升泰山失勢已如氷百年略似夢長短一醉誰知時廢興與俗不諧塵世狹出門大笑暮江横從前壯氣銷磨盡浩浩凌雲賦尚能司馬相如奏大人賦武帝大恱飄飄然有凌雲氣逰天地之間又登髙能賦觀夏耘偶成苗穉纔聞鵶舅呼古詩五月聞鵶舅苗穉憂草茂東阡南畝盡農夫非其種者鋤而去毋使蔓焉難以圖劉章忿劉氏不得職常入侍髙后燕筵進歌舞曰請為太后耕田太后曰若生而為王子安知田乎章曰深耕穊種立苗欲疎非其種者鋤而去之太后為之黙然君左傳蔓草猶不可除况之寵弟乎滴滴盡沾禾下土古詩鋤禾當日午汗滴禾下土安知盤中飱粒粒皆辛苦穰穰行載斛中珠作勞歸舎呼閭里晉書載石勒在田中每聞鞞鐸之聲歸告其母曰作勞耳鳴非不祥徴也共坐牛衣酒一壺前漢王章字仲卿疾病卧無被在牛衣之中與妻訣泣妻呵怒之云云後為京兆尹欲上封事妻止之云卿獨不念牛衣中泣乎客中遇寒食三首極目雲飛落照邉北邙松栢久無煙麥餳偶爾思遺俗菽水時来記徃年禮記啜菽飲水盡其歡斯之謂孝宿業正愁􅀈帶鳥歸心生怕血啼鵑伯倫曠達稱賢士身後何曽到九泉長到清明寒食時客懐如夢復如癡庭空月淡梨花少爨冷煙寒麥飯遲阻隔家山常入夢挨排節物可無詩暮年自是難為别非為棲身近子規桑柘村村已禁煙周宫司烜氏仲春以大鐸巡火禁于國中為季春将出火也後以介子推焚死至時一月不爨東漢周舉為太原守乃始變其俗三日而止蕭條井邑傍山前了無詩酒空三月如此時光又一年對景鶯花如寄耳見人兒女倍澘然業儒不及為農好麥已登場蠶又眠予株守書室不覺有連日隂雨之悶一日移坐晴簷聞行者有快哉晴之語追味其言作詩誌之一雨多時氣積嵐今朝紅日照酣酣鎌腰四野農登麥盆手千家女煑蠶流水繞村澄似練逺山排闥碧於藍此生漫不知蠶織坐竊陳編得少慚僧房借榻方外来㕘兠率天掃除習氣道心堅任渠浮世千年兆史人無百年期强作千年兆鑄鐵作門限鬼見拍掌笑借我空門一榻眼未晤至人存法樂且容髙士着幽禪吟成一笑客歸去又結浮生半日縁老境五十光隂疾轉車秋風落木客思家皮皴腰痛脚無力齒豁頭童眼有花樗木散材多夀考寸田尺宅足生涯老彭八百成何事謾跨商周閱嵗華黄庭經寸田尺宅可理生蓋道家以丹田為寸田面為尺宅臍下三寸為丹田樗散無用之木故得終其天年世本云彭祖在商為守藏史在周為柱下史年八百嵗書家藏蘭譜後華不紛披葉不塵幽貞閒淡出天成似凡非俗同標致入品分流别姓名南欲迎薰西避照晚常溉膩蚤澆清傳君祕訣君牢記更取吾言質屈平夀峯翫月素娥准𠡠六丁擎丁夘神司馬卿丁丑神趙子玉丁亥神張文通丁酉神臧文公丁未神石叔通丁已神崔石卿是之謂六丁者下照塵寰似水晶河漢無雲天萬里溪山不夜月三更齊地記曰齊有不夜城蓋古者有日夜中照於東境故菜子立此城以不夜為名蓋杜詩無風雲出塞不夜月臨闗不夜者月明如晝也蓬莱弱水何曽隔蓬莱有弱水之隔一羽亦沈惟飛可到玉宇瓊樓無此明今夜夀峯峯絶頂與君端坐細推評夜月有客送酒馬軍持送走還僵杜甫謝嚴中丞送乳酒詩云鳴鞭走送煩漁父洗琖開甞對馬軍剥琢先聞麯米香遮莫清風乾石髓嵇康遇王烈共入山烈甞石髓如飴即自服半餘半與嵇康凝而為石烈歎曰叔夜志趣非常而不遇命也為招明月酌瓊漿故人懽伯情千里玉女天公笑幾塲歌罷短衣仍獨速道家有言散花玉女侍香金童短神異傳玉女投壺天為之笑則電故謂之笑電李白歌行天公見玉女大笑億千塲是孟郊送淡公詩其一曰銅斗飲江酒手拍銅斗歌儂拍浪兒飲則拜浪婆脚踏水船頭獨速舞短簔笑伊漁陽撡空持文章多閒倚青竹竿白日柰我何三人對影未渠央立春偶成戊午玉燭光輝萬象豪寛征幸不及吾曽鬢邉綵燕人情熟眼底土牛年紀髙軟餅繭衣行白麥杜詩涼州多白麥注自河渭以西白麥麫涼春種夏收閲二時之氣故也生絲縹線飣青蒿明年對此仍强健莫向樽前歎二毛左傳不擒二毛謂黒白相半潘安仁秋興賦予年四十始見二毛雨不絶四月黄梅正熟時霏霏江雨宻如絲空堦如語互相答倦枕有聞寧不思家樂咸韶真送奏渚涯牛馬竟誰知凄涼情况如何度擁被微吟工部詩杜有雨不絶之作七夕天上佳期樂未央河東帝子嫓牛郎登車閃爍雲旗動開帳熒煌玉燭光此夜金針穿巧線明朝玉珮促行裝經星不動誰當辨或脫朦朧恐未詳秋聲悚聴西南底不平觸於金石碎鏦錚氣回海島波濤勢令壓邉庭人馬聲膽薄生憎牕紙擘夢迴錯被枕稜驚壯懐何事銷磨盡宋玉中年白髪生糓城余航邉老人有能詩聲於僕初未有平生之懽客甞於予誦其一聨半句膾炙人口客又誦僕近作以示余余遂賞音為忘年交怪怪竒竒誦數聨問誰所作是航邉世無賀監誰知白後有揚雄必愛元揚雄注太元曰後五百年有子雲出必愛吾太元矣雪犬倉皇從末俗雲龍追逐付前縁韓詩我願身為雲東野身為龍四方上下逐東野雖有離别無由逢豈韓文越犬吠雲蜀犬吠日雲日有過哉顧吠者犬耳老天若借推敲便賈島初應舉在京師驢上得句云鳥宿池中樹僧敲月下門始欲作推字又欲作敲字鍊之未定吟哦引手作推敲勢愈時權京兆島衝出左右擁至島具對所得句韓立馬良久曰敲字佳遂並轡而歸後不第為僧居法乾寺號無本載劉禹錫嘉話云細叩吾翁肘後傳葛洪手抄金匱藥方百卷肘後要急方四卷長明燈傳燈佛以一傳為一燈喻法如燈燈相續也燈謂能破暗沈沈古殿寂無聞破暗長明伴世尊日月猶知分晝夜雨風終不廢晨昏傳從佛國初来祖照見人生幾世孫底似靈臺光一㸃千灰萬刼鎮長存黄庭章云靈臺盤固永不衰心為靈臺有神靈居之水車機事能移造化權車聲軋軋響前川捲空龍骨層層浪活盡龜紋處處田塹板擿泥秪自苦桔橰縋石笑空懸青裾想是阿香女直欲乗之飛上天書齋獨坐起看庭槐影屢移攤書獨坐已移時文章起伏香分篆議論和同酒一巵貫蝨工深知學進屠龍技巧與心期千流萬派徒紛爾喫𦂳源頭要自知蒲萄走架龍鬚弱不支炎天待月立多時醍醐縱美輸清滑瓔珞雖圓讓陸離珍異曽誇太冲賦纍垂已入退之詩當年若得傳方法博取涼州亦一竒前漢大宛以蒲萄為酒富人藏酒至萬餘石又唐書破髙昌取蒲萄實於園中種之并得其酒法上自損益凡有八色孟佗字伯郎中常侍張讓専權用事佗以蒲萄酒一㪷遺讓為涼州刺史野花浩蕩韶光沒坱垠不曽培植自敷榮青春綽約誰為主紅粉娉婷不識名張易之出塞行腰褭青絲騎娉婷紅粉粧麗質似嫌鵶髻汚暗香空使蝶魂驚君看傾國傾城者豈盡名門閥閱生櫻桃止渇青梅酸齒頬帶香盧橘剥皮膚鮮明綴樹漙甘露的皪傾盤瀉寳珠穉子輕拈愁欲碎佳人未嚼已先無情知苦笋非佳伴𠡠斷庖人莫入厨唐三月宰相有櫻笋厨贈畫史林心鑒寫照龍章鳳姿下雲霠纎鱗弱羽驚飛沈神之所至妙為物面有不同宜鑒心世固期君於絶品誰當借我以全林明春閱厯還添閏整理行囊剰着金李詠詩上林如許樹不借一枝棲答云朕當以全林付卿張翰昨夜西風忽憶吳郵亭長短想歸途倦逰戢翼先翔鴈歸興駕言非為鱸時有未然當勇退形焉何苦為名拘陶靖節詩誰謂形跡拘故園且慰平生意更盡生前未盡壺仙邑館所歸溪行書觸目杏花深處酒堪賖来訪漁翁溪友家短塹插籬防鹿豕小舟牽網截魚蝦鄉村畜牧連荒野漢光帝元光二年匈奴将十萬騎入武州塞見畜布野而無人牧者怪之乃引兵而退墟落人煙閣淺沙自是昇平生聚久女郎共唱後庭花後庭花陳後主所作女學士袁大捨等與後主賔客貴妃逰賞賦詩其曲有玉樹後庭花臨春樂等章其畧云璧月夜夜滿瓊枝朝朝新之句讀秦隠士黄石公素書有原始正道求人之志本徳宗道遵義安禮六篇有秘戒不傳於不道不神不聖不賢之人大抵不離於七國縱横餘習非得於聖賢修齊治平之學辛未館仙邑傳家作識者當觀取履初此翁知過萬人餘英雄自合傳青史經濟非由授素書大道聖賢無隠爾七篇仁義果何如坑焚若為防遺患可笑秦王計也疎晉亂盗發子房墓於玉枕中得之凡一千三百三十六言有隂計外泄者敗小怨不赦大怨必生決䇿於不仁者險設變致權所以解結吉莫吉於知足絶嗜禁欲所以除累與覆車同軌者傾奥亡國同事者滅等語要之不失為說客之雄特所遇之時然耳傅氏招入館既至翼早於牕壁間覩宋咸淳丁卯榜帖兩翁芳躅煥然如目前事追慕久之因漫書四韻辛未嵗挾冊升沈五十春及門雖晚此情親韓歐榜帖家聲舊唐歐陽詹莆義井人字行周舉進士與韓愈李絳崔羣王淮馮宿庾承宣聨第時稱龍虎榜云孔孟詩書教思新筆硯不靈慚末學箕裘克紹異凡人兩翁地下英靈在尚爾流芳壁上塵春半採花芳菲着雨便成苔問訊東君幾日回閏月不曽花下去今朝偶到樹邉来幾何間濶鶯偏老如此生疎蝶也猜流水時光容易過舉頭枝上已青梅海棠沈立海棠記嘉州海棠有色而香花品從来說海棠風流格調賽群芳淵材有恨空沙魘淵材僧名有五恨曽子固不能詩鵞無四掌鱉不重裙海棠無香鰣魚多骨子美無言為發揚杜詩無海棠或云杜母幼名海棠諱之雨透臙脂添薄媚風搖銀燭减輝光妙年若許寒梅聘世上應誇兩洞房洪适盤洲海棠詩云自憐生較晚不得聘寒梅教小兒書懶誦吾伊教小童之無百指奈無功白居易生七月每教以之無字百試不錯晴蛙閤閤鳴枯澤春鳥啞啞囀碧叢杕杜荒疎誠可笑唐李林甫傳林甫不識杕杜字謂韋涉曰此云杕杜何也涉俛首不敢言楞嚴艱澁幾時通安知来者非今日刮眼毋輕吳下蒙吳吕蒙孫權謂蒙學問以自開益後魯肅過蒙拊蒙背云吾謂大弟但有武畧耳今學識英博非復吳下阿蒙曰士别三日當刮目相待題仙遊縣酒家樓當時曽醉美人家簾幙春風響琵琶洪容齋隨筆載白樂天以琵琶作入聲四絃不似琵琶聲亂寫真珠細撼鈴琶朱裦有絶句云昨日施僧裙帯上斷腸猶帯琵絃是也東野已仙閒日月唐絶句云孟郊死葬北邙山日月星辰頓覺間子陵髙卧困龍蛇狂歌莫管唾壺缺世說王敦每醉後以鐵如意敲唾壺歌曰老驥伏櫪志在千里烈士暮年壯心不已歌闋而唾壺半缺矣草檄從教楯墨斜短箭南山曽射鹿可憐鬢髪已鬖髿風流想像太和樓雄跨依稀第一州鳳去不来梧竹老芝焚未改澗潭秋抱朴子曰慮巫山之失火恐芝艾之併焚栁子厚獻宏農楊憑詩木刻終難對芝焚未改芳曽驚飯顆少陵瘦豈為周南太史留唐杜甫傳李白於甫有飯山之嘲白集有戯杜甫詩飯顆山頭逢杜甫頭戴笠子日卓午借問縁何太瘦生只為年来作詩苦而司馬遷傳言武帝建漢家之封太史留滯周南不得與從事出晝居夷從来有後人何用蹈軻丘傳西疇謁學稼乃翁墳招預席學稼與先君同鄉舉丁夘嵗榜首王衡字正平平生欠識魯山元元徳秀字紫芝為魯山令蘇源明謂人曰吾不幸生衰俗所不耻者識元紫芝坡詩恨君不識顔平原恨我不識元魯山幸及蟆陵與執膰西京記膠西相董仲舒墳在長安人為致敬過者必下馬後人記訛為蝦蟆陵非是左傳成公十三年劉子曰祀有執膰戎有受脤崇土豈能埋此老餘波尚可及諸孫左傳其波及晉國者皆君之餘也薛任安敢同爵齒左傳薛不與諸任齒管鮑從知宿好存管仲鮑叔牙二人為友此飲與君須盡器可人春夢了無痕何諷渇賦飲不盡器菜羹雨後過畦嫩甲長士夫此味未能忘筠籠采擷朝脯供土銼烹熬雨露香鹽豉勻調仍㸃酪香粳細搗旋加薑老饕賦好人争誦喚醒歐生為洗狂朱陳村嫁娶圖舊藏朱陳嫁娶二圖絹素甚古上世寳之或以為近世名史所摹亦未可必近為有力者所取不能自保因以韓退之畫記所云自釋故併録之終老鄉闗鬢似銀賢哉惟有古豐民一時桃李隨煙滅千載丹青絶世珍餞席樽罍風近古俟庭冠蓋禮如新雖然未得韓公記已學唐人帶入閩古誼于今尚有無摩挲老眼重嗟吁千年顧陸丹青手兩姓朱陳嫁娶圖要使丁壬傳水火丁火也離為火為中女坎為水為中男丁火也壬水也言女之丁者為婦於壬猶今之隂陽家云丁與壬合之說不將門户嫁崔盧料應合卺皆𤓰葛抵掌樽前笑老奴禮婚義壻揖婦入共牢而食合卺而酳所以合體同尊卑以親之也音閤謹按世說晉温嶠姑有女覔壻嶠自有婚意答曰佳壻難得如嶠如何姑曰何敢希汝比也後日報姑云已得婿矣門地婿身不減嶠因下玉鏡臺一枚姑大喜既交婚禮畢姑女揺紗扇抵掌大笑曰我固疑為老奴今果如此卜山行傷足館夀峯方氏作尼父奔車豈復升劉向說苑奔車之上無仲尼覆舟之下無伯夷長裾佩玉想儀刑封侯縱不能三甲背無三甲不能封侯載道如何可半丁符堅陷襄陽聞習鑿齒釋道安名輿而致之習鑿齒以蹇疾與諸鎮書曰昔晉氏平吳所利在於二陸今漢獲士才一人有半耳跛鱉行行遭笑侮鳴禽句句欠叮嚀敺之罟􅀈不知避蠢蠢胡為萬物靈行不得哥哥題靈巖廣化寺始則鄭氏書室後創寺招客東西窣堵波出城五里鬱峩峩逰人争逐蟻九曲衲子分屯蜂一窠佳句不隨飛鳥盡名山可想屬僧多前修舊日讀書地肯着吟翁坐具麽小說九曲寳珠穿之不得問之孔子孔子教以脂塗於線使蟻通焉廢宅有感炎隆滅絶理之常解嘲炎炎者滅隆隆者絶對此毋庸重感傷亦有髙明瞰其室髙明之家鬼瞰其室似無形氣嘯於梁韓原鬼一朝富貴浮雲散千載英雄宰木蒼公羊傳秦伯怒蹇叔曰若爾之年宰上之木拱矣注宰塜也後世何曽聚廬處賈山至言使其後世曽不得聚廬而托處焉阿房五里麗咸陽史記秦始皇營朝宫渭南上林苑中先作前殿阿房東西五百步南北五十丈上可坐萬人下可建五丈旗以其作宫阿房故名守嵗一首後至元掃退隂凝萬瓦霜儒家守嵗但如常沈香已帶寅前氣臘酒初聞子後香白樂天詩誰道使君不解歌唱徹黄雞與白日黄雞催曉丑時鳴白日催年酉時沒亦祖韓退之和席八庭變寒前草天銷雪後塵之句意亦自佳凍雪驚春先爆竹祥雲夾日上扶桑熙熙民物皆生意天建皇疇福萬方題清潭酒家樓平生汗漫子長遊天地無私亦白頭出曠刼来皆有數明真性外始無愁山川竟掩百年夢烏兔何曽兩處囚信美終然匪吾土寒鵶飛去水悠悠王粲登樓賦雖信美而非吾土兮何足以銷憂水漲溪流㶑㶑碧粼粼失却孤舟野渡横萬頃銀山崖谷裂千堆雪屋路橋平盳眻不辨墨塵馬莊子秋水兩涘渚崖之間不辨牛馬望洋向若而歎跋扈争看赤尾鯨彩羽鴛鴦亦零落風流莫靠浪頭清孟郊詩射鴨復射鴨鴨驚菰蒲頭鴛鴦亦零落彩色難相求儂是清浪兒每踏清浪逰笑伊鄉貢郎踏土稱風流如何角丱翁至死不裹頭霉雨匝地莓苔色轉蒼空堦半月耳浪浪墨膠古瓦添新水衣醭熏爐換好香芳草蛙聲喧處處黄梅雨脚漏牀牀新晴野水兼天濶無數輕橈倚岸傍水僊花俗名金盞銀臺薤葉蔥珩短短枝香清韻絶水為肌月明夜色玉連鎖露冷秋莖金屈巵感托洛神曽有賦漢武命作承露臺立金莖銅柱作仙人掌以承露和玉屑飲之為伏羲氏女溺洛水為神曹植因有感而賦焉後監國謁者灌均所奏品題湘女可無詩商量恰好海棠聘月老無人為主持夏政齋權府再舉留莆郡鎮守小詩誌喜果然弓劒許留莆誰遣將軍酷好儒作賦重遊前赤壁題詩一笑再元都躬親矢石勞王事手捧銅盤是丈夫毛遂手捧銅盤招十九人曰卿等碌碌因人成事坐講唐虞成底事相看摩捋白髭鬚雪後小牕書事一室凌虚離世塵小牕風月足吟情空庭梅竹元冬縞大地山河白晝明火活泉清雲乳亂灰深煙冷水沈清投閒置散應成癖分外吾儂斷不營蒲萄性愛蒲萄䕃夏涼自扶短架接鄰牆金珠瓔珞星辰爛碧樹珊瑚雨露光如琢如磨添滑膩不甘不酢帶清香細吟馬瑙龍鬚句多謝昌黎為發揚予暇日遊城西天泉岩遂並山而西至石室戱作八句石室城西五里餘石頭路滑歩﨑嶇世人自為濁惡染佛書五濁惡世佛性何曽南北居邑屋鱗鱗多布縷阿房賦瓦縫參差多於週身之布縷僧寮落落半樵蘇暮年自㑹安心法克伐都忘怨欲無食㯶笋主人請賦縁木求魚無後灾黄虀未了已安排雖非龍種胚腪出猶得鵞黄醖藉来漢書薛廣徳雅有醖藉味勝羶葷忘禁臠氣含風露奪珠胎供僧留取歸香積齋鉢終然勝芥臺佛書維摩遣八菩薩徃衆香國言願得世尊所食之餘欲於娑婆世界施作佛事香積如来以衆香鉢盛飯與之山家饌客富盤飱菜把終叨地主恩杜清晨蒙菜把常荷地主恩且賞珍竒類魚子莫將同異别龍孫羶腥幸免黄金錯酩酊終同老瓦盆杜詩有老瓦盆勿向朱門詫風味萬錢一任飽雞豚養拙戯作閑身長向拙中養養到白頭寧不癡時好懶义西洛手事非謾撚晚唐髭痛渠因弄巧成此老我要將勤補之莊子云聞道雖晚而以勤補拙也反閉柴門徑投枕世間了事付羣兒次黄畊叟詩倡韻簡族姪秀岩居士泉上伊誰作此亭詩成客散寂岩扄日經蒙悉山腰紫淮南子曰日經于泉隅是謂髙舂頓于連石是謂下舂言將欲暝下蒙悉舂故曰下舂黛㸃波斯佛眼青浄業從渠華地種髙吟喚我俗縁醒即今想像髙堂賦何日連牀欵夜欞僧粲傳法於恵可云華種曽因地從渠種華生若無人下種華亦不能生頌抛龎老浄名佳塵俗元無更出家青色何曽了齊魯髙標直欲接裦斜班固左界裦斜秦谷口也註云南則日裦北則日斜壺中更有神仙藥盆底從開頃刻花好是紅崖標格在不妨留與世人誇春晚郊行書所見栁下經行不礙些莎平草軟緑陂斜雨餘溪澗淺深岸門外野棠紅白花隔水明邉知晚照倚山盡處是誰家隨他亭舘春皆好擬看東鄰菓下車後漢濊貊獻菓下馬髙三尺乗之可於菓樹下行詩寄三山諤勒哲圗萬户逹嚕噶齊公疊序軒渠墨尚新每因見墨即懐人裹瘡四戰朝無暮脫體全歸秋復春嵗月蹉跎嗟我老斗牛隠晦為誰神篇詩少寓嗣音意布鼓雷門喜有因呈孫僉事漳州撫諭回司繡衣斧鉞掃欃槍杜幾時回節鉞戮力掃欃槍崆峒腰䥥麥正黄瘴地溪山初見晛花時草木尚經霜氛祅竄伏無奸猾風憲操持有紀綱鈍筆不堪模寫力欲呈帳下倍慚惶典畧劉荆州曰予甞作書欲與孫策伯符禰衡正平誚之曰言如是為但令孫郎帳下兒讀之乎将使張子布見之耶觀薛公鶴逸氣昻藏迥出塵薛公畫鶴儼如生杜薛公十有一鶴低昻各有態磊落如長人已拚勾漏丹塗頂晉葛洪字稚川以年老欲煉丹祈遐夀聞交趾出丹求為勾漏令帝以洪資髙不許洪曰非欲求榮以有丹耳帝隨之更費波斯黛㸃睛乍可使之侍軒几不堪騎去訪蓬瀛清風動我小牕竹幾誤聴渠戞戞鳴斷碑何代殘碑仆地横難哉嗣守愧神靈莓苔剥落埋龜石日月侵尋瘞鶴銘千古英雄雲影滅百年興廢草頭青襄陽耆舊毋庸歎荆棘銅駝喚不醒索靖知天下将亂指洛陽宫門銅駝曰㑹見汝在荆棘中莆田楊宰追理暢山祭田租粒奉謝三洪舊徳幾猶存與冀音義同興歎俄驚及雍門雍門周以琴見孟甞君豈謂大田猶有稼可堪東郭已無墦斯文幸有千門庇古誼難忘一飯恩韓信寄食漂母後封楚王都下邳召母賜金百斤史記范睢傳一飯之徳必償也多謝彦倫知已厚周介福其鄉人也吹嘘直欲送天閽杜贈起居使獻納田舎人揚雄更有河東賦惟待吹嘘送上天種竹移得霜根趁雨栽牆隂踏破一方苔甫能引汝清風到未暇招渠俗子来猿訝便當書案立鶴知早避釣船回不妨更了嵗寒計早晚栽松兼種梅夏畦自鋤荒穢種山西豈落為萁草欲迷六月驕陽焚赤地一生精力悴荒畦杞苗䔫甲黄而隕麥蒔麻蒸翠未齊自笑艱難生理窄何由得酒醉如泥晉通侯楊惲以罪廢家居治産孫㑹宗以書誡之答以詩曰田彼南山蕪穢不治種荳一頃落而為萁人生行樂耳須富貴何時山中逢元夕初入方氏館雪後連朝快放晴料應燈火壓城闉銀花火樹不知夜繡轂香輪欲奪春閴若無聞清管寂居然相對短檠新今年不帶元宵分月色深山不負人首夏偶成春光恰好便分違一眺園林緑正肥幽草蚤闗牌印出浮花逺卸轡啣歸蛙王踞坐楚歌發蝶使行成漢騎圍快入時粧挑闥子已將絺綌換春衣項羽聞漢軍四面皆楚歌驚曰漢皆已得楚乎雪髭計較營為百念輕獨於此事未忘情功名不建頭顱老日月如馳髀肉生蜀志劉備在荆州牧劉表座上起至厠慨然流涕還坐表怪問之曰平常身不離鞍髀肉皆消今不復騎髀裏生肉日月如馳老将至矣而功名不建是増吾悲耳齒儘摧殘猶解嘯晉書謝鯤鄰家卨氏女有美色鯤甞挑之女投梭折其兩齒時人為之語曰任達不已㓜輿折齒鯤聞之傲然長嘯曰猶不廢我嘯歌身無寵辱又何驚幸然見道存真性却笑恒河數改更啖杞菊本草枸杞冬採根春夏採葉秋採莖實久服輕身不老一名仙人杖千嵗其根如犬雷聲殷殷草頭青又見春風拂翠屏夜吠精神存下體日餐功効益頽齡雪𦵔細芼茶初熟鹽䜴輕調酒半醒蚤辦葛巾與芒屩明春要採首陽苓白樂天詩不知靈藥根成狗怪得時聞夜吠聲以陸機甞詣王濟濟指羊酪謂機曰卿吳中何敵此答曰千里蓴羹未下鹽豉傅西疇恵詩次韻自從時世好新粧閤閤群蛙亂草堂昔人有時世粧詩云時世粧時世粧城中出来傳四方謾道衡湘師栁子韓文衡湘以南皆以子厚為師不聞江夏有黄香黄香後漢人博學能文當時語曰天下無雙江夏黄童叵堪我老無儒術猶幸家傳有義方未必便皆為駕說法言學行仲尼駕說也不在兹儒乎如将復駕其說則莫若使諸儒金口而木舌傅氏師于栁諸生好聴鐸聲揚香篆婆律出波斯國膏香在木心中酉陽雜爼一木五香根旃檀節沈香花雞舌葉藿膠薰陸又龍腦香出婆利國有婆律樹髙八九尺瘦者出龍腦香肥者出婆律香與龍腦同生一樹塵霏婆律屑旃檀四勿銷宇泰寛莊子庚桑楚南榮趎至老子之所願聞衛生之術老子云身若槁木之枝而心若死灰若是者禍亦不至福亦不来福禍無有烏有人灾也字泰定者發乎天光晝几回文榮錦字晉書列女傳符堅時竇滔為秦州刺史被徙流沙妻蘇氏織錦為回文凡八百四十字以贈滔云夜爐養火伏金丹古嵩子丹砂行伏丹訣丹砂五兩結永為砂子養火七日為玉笋屑之為銀啜空茗椀雲初動坐厭蒲團夜向闌韓詩坐厭親刑柄俗慮湛然如止水試將心向此中安傳燈録恵可謂達摩曰我心不安乞師與安師曰将心来與安曰覔心了不可得師曰與汝安心竟黄山谷詩云險心㳺萬仞躁欲生萬兵隠几香一炷靈臺湛空明意思自佳醒酒石廬山記陶淵明居東里有大石甞眠其上人謂醒酒石唐李徳裕平泉别墅有醒酒石園林逰翫足怡神木石平泉輦怪珍李徳裕平泉庄鉛松怪石悉收致於其中狎弄杯觴輕一石沈光太白酒樓記狎弄杯觴沈溺麯蘖史記滑稽傳齊威王置酒後宫召淳于髠賜之酒問曰先生能飲幾何而醉對曰臣飲一斗亦醉一石亦醉賜酒大王之前執法在旁御史在後髠懼俯伏而飲不過一斗即徑醉矣至若杯盤狼藉堂上燭滅主人留髠而送客當此之時髠心最歡能飲一石招徕湖海重千鈞白樂天太湖石記或淪海隅或淪湖底髙者僅數仞重者殆至千鈞齁齁鼻息終頽玉颯颯天風為拂巾三萬六千沈醉後未知轉徙付何人謝林教授良佐寄油煙墨長跪看君遺鯉書感君嘉恵甚勤渠香煤幾夜燈花落翠色一池雲影舒詩病銷磨遇蝦蟹能起宿疾書訛編剗困蟲魚吟成裁答無牋翰凖擬揮題染素裾張伯英善草書家之衣帛必書而後染之續軒渠集卷五
