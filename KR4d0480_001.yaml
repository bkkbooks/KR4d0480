body:
  text: 續軒渠集卷一元洪希文撰五言古風上休假與童冠散䇿林麓十日得一假暫輟琴書遊童冠各休沐用憩林塘幽林塘窮勝處密䕃波光浮緬懷風雩㑹志若㸃與求悠然千載下天地真同流顧惟青襟子豈敢追前修賢聖固有分情性理則侔幸乘一日澤散此九日愁前哲有格言雖休亦勿休張安世傳休沐未嘗出休沐漢制也言惟得休沐假而後相聚也孔子曰百日之蠟一日之澤非爾所知也注云蠟之祭勞農以休息之言民勤稼穡有百日之勞今一日飲酒燕樂君之澤鄭獻可為道士丘性道求詩往遊洋作修真道室書以贈之祈年既有觀望仙亦有宫吾行自却曲俯仰將曷從祈年觀秦穆公所造望仙宫漢武帝所造莊子人間世迷陽迷陽無傷吾行吾行郤曲無傷吾足注卻空也曲從順也虛空其心隨順物性游洋古勝境山水嵩華同近聞巢山者云是浮丘公一段香火緣素心鬱冲冲方陳兩髙士夙有嚮道風朗誦蕊笈文逺落茅竹叢五城十二樓已卜縹眇中稽山讀書處澗谷遺舊蹤一去三十年止水迷西東尚留半石髓欲往夢不通兹會儻可期願言從赤松劉向列仙傳王子喬周靈王太子也道士浮丘公接上嵩山三十餘年復來於山相告别曰告我家人七月七日待我於緱山上果乘白鶴駐山頂舉手招謝世人而去仙傳崑崙圃閬苑有玉樓十二元室九層左瑤池右翠水環以弱水九重非飈車羽輪不可到漢書黃帝為五城十二樓以候仙人李白詩天上白玉京十二樓五城仙人撫我頂結髮授長生半嵇康遇王烈共入山烈曽得石髓如飴自服其半餘與康凝而為石烈歎曰叔夜志趣非常而不遇命也燒列仙傳赤松子神農時雨師服氷玉教神農入火自至崑崙山堂止西王母石室隨風雨上下炎帝少女追之亦仙去張良願棄人間事從赤松子逰琴枕至音何寥寥古道行古心枯槁斫為枕用枕體乃琴虛中具徽軫簧舌韶濩音操之當薰風不僭雅以南詩鼓鐘以雅以南以籥不僭注雅二雅也南二南也僭亂也言三者皆不相亂也吾聞古巢父遺瓢掛空林有形即有纍湛若止水沈所以魯東家曲肱意彌深論衡曰魯人不識孔子聖人乃曰彼東家丘者吾知之矣毒魚吟澤梁古有禁數罟不得施不足尚不食况乃草䕓之征蜀聨句聖靈閔頑嚚燾養均草䕓注草毒殺草也文王行直鉤周綱全盛時湯網去三面殷道猶未衰詭遇今若此吾焉能不悲閏八月郡庠小集呈髙一初廣文併會間諸老今年中秋月不見白玉盤天公莫省事留待閏月看邂逅至此夕萬里雲漫漫孀娥為誰怨不肯驂素鸞樽酒興不盡聊借今日歡庭前桂花開更覺酒量寬隨遇皆可樂何必逰廣寒相從君子堂餘慶由衣冠當時金谷園徒起長恨端丁寧座中客慎勿嫌冷官東籬菊漸黃尚可供逰觀李白詩少時不識月喚作白玉盤宫龍城録八月望夜明皇與申天師逰月寒氣逼人霜露霑衣過一大門在三光處見一太府榜曰廣寒清虛之府少前見素娥十餘人縞衣乘白鶴笑舞於廣庭大桂樹下樂音清麗上皇歸製霓裳羽衣曲鮑照明逺東門行長歌欲自慰彌起長恨端戲贈阿鼎阿鼎生苦晚雖晚覺亦好行當小學年不獨知灑掃朝誦數行書夕記已草草時來學父作句律亦帖妥翁無萬金産賴爾舒懷抱相對成欣然造物豈窮我呈知事盧端智泰定丁卯進士字可及常州人空谷有幽蘭自謂生得地既安泉石性雨露亦云被奈何蓁莽深緑艷日凋瘁根本固無傷終然鮮生意春輝雖借暖退則寒者至向不遇清風幽芳恐終閟唐田逰岩隱箕山髙祖幸問曰先生此佳否曰臣泉石膏盲烟霞痼疾傅西疇學録辱惠佳章次韻奉答諸公蚤脫頴太𤣥縻子雲一携梁園冊久廢鄭谷耘辱君敦宿好臭味芝蘭芬緬懷兩翁舊執手追前欣過眼破萬卷翻水工為文嵗月邁幾何相對疑夢魂君才異噲伍氣若扶桑暾酒殽接清夜軟語尤殷勤哀帝時丁傳董賢作相諸附之者皆起家至二千石時揚雄方草太𤣥自守泊如也韓詩文如翻水成初不用意為前漢韓信廢為淮隂侯過樊將軍噲噲趨拜送迎言稱臣曰大王乃肯臨臣信出門笑曰生乃與噲等伍也維摩經言大富梵行所言誠諦常以軟語可杜詩夜闌接軟語落月傾金盆唯有摩尼珠照濁水源廬陵劉晴閣希孟郡幕謝吉甫元發三山林秋江坤共逰柯竹圃池亭分韻賦詩僕得耳字斯晨作斯逰四座冠劒偉主人大作豪快論轟兩耳銀葉炷名熏烏絲垜竒字氷襟取誦吟聲節中宫徴中觴起喧譁散䇿步逶迤一徑縈松筠八窗秀荃芷矯立挹幽芳清坐鑑碧泚豈不懷極歡日轂轉何駛回軒互追奔興盡具復已聚散難前期願言顧終始聞清漳近信龍逃海水熱簡書亦足畏簡書戒命也簡詩豈不懷歸畏此書蹇蹇皆王臣或有獨勞悴有司輸軍儲風帆往供餽朔風卷欃搶願散旄頭彗蒼生豈不困督責太煩碎側聞良家子坑塹分填棄坐視若不聞勇壯失贔屭母負朝廷恩泥沙傾廪餼猖獗迫河隍踟蹰果何遲音治待也堠鼓日夜鳴擊鮮交勞吏漢陸賈謂其子曰數擊鮮母久溷濁也燕寢尚宵衣健兒獨搴幟聖祖仁立國垂統千萬祀方隅有竊發敢不趨父事宜推子弟恩疾痛䏒膺臂奈何當此時反若秦越視太平日已久凶惡無噍類富庶非不多休禎靡不至何當穢濁清凱奏歡童稚使我閩囝翁翹首瞻佳氣欃槍妖星也示阿鼎一日不再食或至餒且飢一日不講學豈不愚而癡聖道既已逺賢哲亦已萎此心苟有傳來者獨可追清晨淨掃地盥漱臨清漪端坐髙拱手邈焉起遐思立身天地間聰慧為男兒不事分內事成名吾不知送林景惠和興化教諭三首華星何歷歷際此時休明嚮來章甫冠太平皆長纓某也收科第濯濯邦國楨某也受書禮擬作觀光行儂亦清浪兒嵗月徒峥嶸夀陵欲進步蹇澀路不平豈不念憔悴借譽無公卿逝將買一廛空谷為耕氓歌聲出金石聊以陶吾情杜舂陵行兩章對秋月一字偕華星鴦孟郊詩射鴨復射鴨鴨驚菰蒲頭鴛亦零落彩色難相求儂亦清浪兒每踏清浪逰笑伊鄉貢郎踏土稱風流如何角丱翁至死不裹頭莊子讓王曽子居衛緼袍無表顔色腫噲手足胼胝三日不舉火十年不製衣正冠而纓絶捉襟而肘見納履而踵决曳縰而歌商頌聲滿天地若出金石朝遊夾漈山漈水何漣漪暮登石門山山石亦差差水石太古色山人去何之君今逰此山為豫訪頽基多謝吹藜翁七略今有歸矧兹十室邑文獻猶庶幾君子樂育才薪槱理不遺白袍久延佇雪立風披披喣之以惠風暢若春陽熙前程雖云邁來者猶可期夾漈鄭夾漈所居石門陳聘君所居昔我侍吾翁設教山水鄉摳衣琴冊暇問禮俎豆行在寢皆淵騫籍湜走以僵五年飽藜莧粗糲甘我腸别我事瓦解改色從新岡蓁荆暗丹雘巋然魯靈光回首三十年追憶成荒唐獨有溪水聲絃誦猶琅琅揚子或問淵騫之徒烏乎在曰在寢曰攀龍鱗附鳯翼巽以揚之勃勃乎其不可及乎如其寢如其寢漢書徐樂曰天下之患在於土崩不在瓦解靈靈光殿賦序曰未央建章隳壞光巋然獨存擬古二十韻呈賀郡守壺山有寒士裋褐長不完漢貢禹裋褐不完裋關西謂襜褕短者為平生多苦心特立古所難從人僦居宅仰給空瓢簞量力守故轍所至軌跡環陶淵明貧士詩量力守故轍豈不念飢寒少壯遊鄉校名綴淵騫班中年復棄去祿耻顓孫干闕俎豆賢人間闕古禮曠已還闕周旋中禮去復見此漢官後漢書今日復見漢官威儀講堂時勉勵闕諸生既有養闕究心靡不至念慮勞百端僖功頌泮水陸德歌衡山豫磨南山石闕用刑不以猛接下常以寬闕千里茍生意豈謂遺一寒漢禰衡始弱冠孔融愛其材為之薦曰鷙鳥纍百不如一鶚使衡當朝必有可觀貧甚食草具作赤莧如赤脂苦蕒甘如飴盤登惡草具味等薇與芝賢哲逝已逺昧昧豫所思伊人既忘世此外皆若遺粱肉世豈乏飽死黃吻兒千金渥窪種嵗晚鳴枯萁尚餘耽書癖不與塵土緇此樂豈在外簞瓢猶山雌蹇劣安所性所恨生清時渥窪在三危山燉煌郡界揚子法言修身或問回之簞瓢臞如之何曰明明在上百官牛羊亦山雌也暗暗在土簞瓢椊茹亦山雌也何其臞拙詩皎皎固易汚缺缺非所宜聖有不待教賢有聞而知首陽豈真拙餓隱將詭時凡此座上人聽我歌拙詞言拙默固好語訛人所嗤行拙不加修名出謗亦隨官拙事不集職曠祿為尸政拙民必擾令煩冗不治學拙德不進業廢功無施智拙心必方大圓不可規交拙敬不周此道今如遺才拙分有定不可中革之傳誡諸髙明請毋忘拙詩老子其政察察其言缺缺注小智貌缺缺與缺缺同栁子乞巧文天之所命不可中革泣拜欣受後悲先譯段郎君靜觀遊梅峯留題諸君屬和已倦筆東溟師始授簡率爾倚韻姑附于卷末云旁魄哉生明維時月指卯暖氣襲餘春㬢光猶見昴攬衣聞鴂舌圓滑弄清巧禪房卉木深緯繣繁璵瑵元花隔􅀈褵那復辨秦姣新詩發其英癢處倩爬爪愔愔抱所諾牽俗困纒繞伊豫負微尚野性便箕笊騷壇紛哲匠飛刀口當咬彩筆不足摛并刀豈容鉸天風吹幡旗鉛槧久鉎􅀈緬懷同心言雙繭困抽絞愧乏王貢才願言師龔鮑纎芥收靈珀餘芳掇芹茒一時文字飲水陸富炮煼南烹雜禽殼近食云稍稍吐句味鮮醲咀嚼償一飽詩筒遣屬和鵝鴈正喧謅中行不可得屑屑思狂狡恆山憂國心孤軍張蠻獠倚歌帳下兒莫把夜眠攪午窗坐睡默坐足清睡清睡寓默坐耳目非視聽視聽自有道天將大任人鮮不繇轗軻作止語默間教思非不好惟坐近齊莊惟睡近怠惰怠惰氣易昏齊莊力易耗懷安實敗名惕勵宜自課所以坐睡佳如以濕膏燥雖休亦勿休存道無小大喚醒羣迷心孔孟日杲杲列子老聃弟子有亢倉子者得聃之術能以耳視目聽魯侯聞之使上卿厚禮而致之卑辭而問之曰傳者妄也我能視聽不用耳目不能易耳目之用夜卧濯足晨興則頮面夜卧則濯足晨夜一日間貴賤異湯沐樵林拾墮薪繘井汲寒玉解苞出山芎近市收麥麴此鄉瘴癘地逰客所食宿宜收薪水功逺去霧潦毒氣脉日流通膚體春盎燠雖無兩女跣音洗幸免泥塗辱手足輕欲旋叫嘯如生鹿它年期賜履名掛尚方局左傳申叔展語還無社中有麥麴乎曰無有山麴藭乎曰旡河魚腹疾奈何杜預注麥麴藭所以禦濕欲使無社逃水中軍前不敢正言故隱語耳二藥皆能禦濕也曰漢馬援謂官屬曰吾從弟少逰嘗哀吾慷慨多大志士生一世但取衣食才足至求盈滿但自苦耳吾在浪泊西里間虜未滅之時下潦上霧毒氣薰蒸仲視飛鳶跕跕墮水中念少游平生語何可得也府掾林靜夫照勘學職金谷花滿園風雨苦相厄東君不著力荏苒成蕭瑟儂亦種花人㸃綴紅與白命分薄於花飄墜隨喑默今朝風信好盡是看花客紅紫盡醫治辜負無顔色儂吳人語也其自稱及彼皆曰儂呈莆田楊明府明星出南紀照夜光爛爛披衣起周覽百里渺河漢莆為壯哉縣飽閲三年宦美錦晚操刀凋瘁已過半關西老夫子學道悟一貫不猛亦不寬善政孰也慢走也忝卜鄰種栁兩家看雖無酒酣失早已戒鵝鴈新詩非造次聊用博笑粲此生復何求已識荆州願曹參為丞相逰後圃聞吏歌呼反取酒張坐飲大歌呼與相和衆韓酬崔少府有時未朝餐得米日已晏隔牆聞歡呼口極鵝鴈白居易與元八卜鄰詩明月好同三徑夜緑楊宜作兩家春李白上韓荆州書天下談士相聚而言曰人生不願萬户侯但願一識韓荆州古意妾昔未嫁時深閨藏蛾眉黃金拄北斗一覿不可期世情無定見雞鵠分貴賤珍重明月珠不學璞三獻香葵割傷根甘井汲先渾誓結同心言薄俗難具論韓詩外傳田饒事魯哀公而不見察謂哀公曰夫雞有五德君猶日瀹而食之者以其所從來近故賤也夫黃鵠一舉千里食君魚鱉啄君稻粱無此五者而貴之者以其所從來逺故貴也故吾將去君黃鵠舉矣公曰吾將書子之言卞和得璞玉三獻於楚而刖其足荆山在襄陽府南漳縣今有抱璞岩中秋對月四時秋均平子夜天髙寒曶曶人影散湛湛杯意間况然悟大巧琢此玉一團圓明具心體灑淅開眉端林有起樛宿谷有空幽蟠秋豪不能遁至潔若可餐東浮在溟渤西照彌長安令人渺浩思與物齊大觀矢歌繼長嘯駛筆追冥翰敲推亦何事忘言有真歡魏文帝詩秀色若可餐呈稅使索所植稅夷齊首陽薇黃綺商山芝要是避世士藉此充朝飢天下今一家尺土亘地維蹇蹇皆王臣祿足充耘耔不仕還不耕儒冠老而癡􅖏門考墳典不受塵勞羈忽傳聨騎來榮耀驚童兒幸接咳唾音磬折聽指揮莊子漁父杖拏􅊇立而夫子曲要磬折再拜而應得無太甚乎堯仁大如天立國存明威種田納地稅買賣商算之所恨土産薄不給糟床資倘得食其力免歎終嵗疲黃屋憂元元常發匡濟思錙銖苟過取或恐傷單羸資富與地侔不在民膏脂龜背欲刮氊九牛亡所遺或問華談諺言相去九牛一毛寧有此理乎談對曰昔者許由巢父讓天子之貴市道小人爭半錢之利此之相去何啻如九牛之一毛也願移髙明思俯聽危苦詞詞苦能藥人勿憚先顰眉史記商鞅云甘言疾也苦言藥也唐太宗髙馮鍾乳一劑曰而進藥石之言朕以藥石相報省事四章一章言其涉世而知止足二章言其處困而亨三章言其守約而貴自養四章言其守道不汚世衰道微四維不立士君子猶改其度焉嗟乎豫不及見白華之未廢也生無適俗姿止足了殆辱絶交謝二仲蔣詡舍中竹下開三徑惟羊仲求仲與之逰二仲皆挫志逃名陶淵明與子書曰但恨鄰靡二仲造謗避三叔時携牛角書且作生眼讀唐李密乘牛挂漢書一帙角上行且讀之疲極酒霑唇軒渠隨意續生事姑置之有子吾事足扶杖擷藥苗呦呦啖生鹿魚目復魚目胡為不自足世以先為妖誰云暗非福璞珍不必獻瑟工祗自辱韓答陳商書云云客罵之曰王好竽而子鼓瑟毖雖工如王不好何是所謂工於瑟而不工於求齊也所以伯牙髙終焉卧空谷衛生智養恬度世老欲拙熊鳥自經伸道引無外說緬懷葛稚川法得金丹術孰若王夫人鉛汞戒馳突地僻忘冠巾客至動旬月几閣餘舊書慵來就風閲莊子繕性生而無以知為也謂之以知養恬鑿方不受圓非固事髙潔舉世我求蒙吾道竟迂濶追曲競周容仁義豈茍活近者兩年間户外無立雪東家書幣至醯甕覆誰發既無十二經未易語優劣千鈞與蟬翼輕重正漫滅西施保厥美􅙵母亦可恱假儒孰敢非死罪終不脫所以省事佳不用求叨餮孔子西藏書於周室子路謀曰由聞周之徴藏史有老聃者免而歸居夫子欲藏書而往因焉夫子往見老聃而老聃不許於是翻十二經以說刪詩書定禮樂修春秋贊周易此六經也又加六緯合為十二經老聃中其說許其有理也夀峯館所擬古問訊光孝東溟講師上人戊寅棲息無塵雜滿目雲舒舒别來雲間人賴此可與娛情親跡自逺道舍人豈疏回首自怡恱無心覺真如陶宏景辭祿八山梁武帝詔不起陶詩云云山中何所有嶺上多白雲只可自怡恱不堪持贈君梅峯頂有自怡亭溟師真天人法口如瀾翻能令坐下猊翹首諦真言下堂復演孔吃吃窮朝昏韓退之送山南鄭相公詩樊子坐賔署演孔刮老佛大車無殊轍目擊道所存如何歡會難陟巘思髙鶱何苦將兩耳受此鵝鴈喧孟郊詩何苦將兩耳聽此寒蛩號韓詩隔牆聞喧呼衆口極鵝鴈豈不畏遲暮竊有顧戀恩離合自有時努力加盤餐豆粥辛勤理荒穢嵗晚成枯萁非力輒不食孺子豈我欺今朝卯酒醒塵肺渴不支老妻進作粥咀嚼如牛呞充飢軟如酥止渴甘如飴一飽萬想滅昧然忘所思傷哉同根言感彼曹植詞徐稚豫章南昌人家貧耕種非其力不食韓詩匙抄爛飯穩送之合口軟嚼如牛呞成世說陳思王曹植魏文帝弟也帝令十步成詩如不行大法植即應聲曰煮豆燃豆萁豆在釡中泣本是同根生相煎何太急帝感其言而釋之癸酉閏三月十六日仙邑館所兒子琦入夢悵然不懌後八日自解人生夀幾何過若飛鳥速詎云垂老日缺汝淚一掬棄來將一期觸感常在目夜夢或見之恍若牛䑛犢回頭語鍾琰晉王渾妻此子豈不蓄得非愛惑聰戲我如焦鹿吾年在桑榆期汝猶絲竹胡為舍我逝世事如水覆嗟哉六如身悟道講已熟莫將恩愛刀更刻風中燭杜詩餘生如過鳥列子鄭人有薪於野者擊鹿藏於隍中覆之以蕉俄而遺其所藏之處遂以為夢順途而詠其事傍有聞者用其言而取之輒晉謝安謂王羲之曰中年以還易於哀樂與親友别數日作惡羲之曰年在桑榆自然至此正賴絲竹陶寫常恐兒輩覺損其歡樂之趣再白樂天詩不將恩愛子更種煩惱根古詩覆水難收淮南子曰日在西景景在木端謂桑榆題王右軍妙墨家蓄會稽書丰度吾所愛縱意之所如浩若風卷斾方其筆在手神思在筆外心畫根於心羲也得其最天門與鳳閣龍虎之所駾鍾張繇芝至羊禇欣遂良具體未至大結髮事揮染披覩心眼快剡藤玉雪膚番幅何足怪舊習老未除昏花常昧昧十襲發珍藏何啻寶越貝一息苟尚存此藥容少懈秦王不格物蛇蚓笑千載珍重庾安西區區題紙背世無揚子雲太𤣥則為贅梁武帝評書謂王右軍書字勢雄健如龍躍天門虎卧鳳閣王羲之我書比鍾繇當抗行比張芝草猶當鴈行也羊欣書如婢作夫人不堪位置舉止羞澀終不似真藤前漢有結髮翰墨言幼習其事唐舒元輿作弔剡文宋愚人得燕石藏為大寶周客觀焉主人齊七日端居元冕以發寶革匱十重緹巾十襲客掩口大笑曰此燕石與瓦甓不殊主人大怒曰盲賈之言醫巫之心藏之愈深守之愈固王羲之傳後制唐太宗論蕭子雲近出擅名江左僅得成書無丈夫之氣行行若縈春蚓字字若綰秋蛇誠無骨力也卧王濛於紙上坐徐堰於筆下以得兹美非濫名耶駾奔突也右軍書每紙背庾翼題云王會稽六帖二月三十日食筍甚美因記蘇子瞻食菜有味含土膏氣飽風露雖粱肉不能及之語為作短句煮筍烟火氣燒筍泉石味烟火發清真泉石存嫵媚燒煮勿復論二一一而二易牙辨淄澠先得我所嗜周昌與屈到菖葅雜菱芰云胡古聖賢口腹亦為纍我本山林人食竹自幼稚采葑毋棄根拔茅以其彚味含土膏新氣飽雲露萃萬丈披琅玕森然戰腸胃至今餘汗簡餘債償未既老叨尚饞涎後災猶髣佛且食莫躊蹰因果如夢寐東方朔曰豐鎬之間號為土膏其價畝一金易牙齊桓公臣淄澠二水名以之為食易牙皆辨其味桓公試之果驗菖吕氏春秋文王嗜菖蒲菹孔子聞而食之左氏所謂歜是也屈到嗜芰將死戒其子曰苟祭我必以芰及祥宗老皆薦芰屈建命去之曰國君有牛享大夫有羊饋士有犬豕之奠庶人有魚炙之薦籩豆脯醢上下共之不羞珍異不陳庶侈夫子以其私欲干國之典遂不用子夏肥或問之子夏曰吾戰勝人問何為戰勝曰吾入見夫子之義則榮之出見富貴又榮之二者戰於胸臆而夫子之義勝矣戲作蚋子詩舉世徒憎蚊蚊毒不及蚋蚊形固已微比蚋尤瑣碎群然來無聲但覺芒刺背漢宣帝謁髙帝廟霍光驂乘帝內嚴憚常若芒刺在背其臣見嚴憚如此熟視乃見之其小真無內公然破白日吮血無隂晦青蠅能汚人詩人數其罪汝惡能幾何自臭徒起穢顧惟孱弱軀豈不容百輩拍之恐效尤置汝於度外晉書王道指周顗腹曰此中何所有顗曰此中空洞無物然能容卿等百輩漢光武積苦兵聞隗囂遣子公孫述逺戍邉陲乃謂諸將曰且當置此子於度外讀栁栁州食蝦蟆賦形有知覺莫不資飲食上聖守道心人心拋不得鄉黨言之詳莫匪視爾極夫茍失其正嗜味亦何益吾觀栁栁州南食初不識近食不下咽咀吞面汗赤牛炙不必飽所飽千金璧丈夫貴全身逺就期他日韓退之南食詩腥臊始發越吞咀面汗赤讀韓昌黎石鼎聨句序昌黎真天人大唐五色筆彌明入模寫面目端可識維時劉與侯流輩逺莫及香名散人耳詩讀方籍籍豫觀二子才何啻扛鼎力云何指壚中神思久縮瑟豈其牆壘髙見短方外客固知千鈞弩鼷鼠何足嫉惜不使軒轅見正老宗伯咳唾成珠璣鏗鏘發金石峩峩古罍洗一掃盆盎質再拜面發騂斂袵當避席賴倚序流傳價重千金璧杜八哀詩汝南讓帝子眉宇真天人識衡山道士軒轅彌明舊與進士劉師服相校書郎侯喜有能詩聲夜與說詩彌明在其側貌極醜白髮黑面長頸髙結喉又作楚語喜視若無人彌明軒衣張眉指壚石鼎謂喜能與我賦此乎劉見衡湘人說云年九十餘矣劉以老頗貌敬之不知其有文聞說大喜即綴其下道士啞然笑曰子詩如是有似譏喜劉侯相顧慚駭欲以多窮之即又為而傳之喜喜欲壓道士營度欲出口吻聲益悲欲書復止竟不能竒道士髙踞大唱其不用意而功益竒劉侯已賦十餘韻應之如響含譏諷夜三更二子思竭不能續起謝曰尊師非世人也願為弟子不敢論詩道士奮然曰章不可不成也謂劉曰把筆來吾與汝就之又唱四十字為八句書訖使讀吐陸賈聲名籍籍江淹謂郭鞏曰子之咳唾成珠璣氣作虹霓水盆怪石雜以蒲竹不减泉石之趣為作短句廬山幾萬仞鏡湖方一曲二物美則美在耳不在目平生幽討意正緣力不足白首窺陳編妙處講已熟誰知好事人埋盆浸坤軸杜詩萬頃浸坤軸卷石疊為山玲瓏透寒玉細竹直而漪寒蒲茸更緑放懷觴詠間户庭有林麓就中有佳趣日寫三四幅幽客過我廬一笑聊捧腹唐賀知章會稽人授祕書監以病為道士上賜鑑湖一曲衛史記日者司馬季主捧腹大笑絶倒笑而倒也晉書玠談道平子絶倒續軒渠集卷一
