body:
  text: 續軒渠集卷七元洪希文撰五言絶句贈東園方子敬棄儒學醫出門謝孔周面壁説神農莫道上池水根源洙泗中扁鵲勃海人也姓秦氏少為人舍長舍客長桑君過扁鵲獨竒之語謹遇之長桑君亦知扁鵲非常人呼扁鵲私坐語之曰我有禁方年老欲傳與公公母泄乃出其懷中藥與扁鵲曰飲煮上池之水三日乃知物矣乃悉其方以與扁鵲忽不見知古方書云以知為度未再服父師傳肘後非桂亦非參珍重不龜藥毋勞售百金莊子不龜手之藥注云其藥能令手不龜拆也龜音皸音義同牡丹雖異山林質生於水竹涯只今爭富麗喚作洛陽花國色酣朝酒天香散曉風荒村蜂與蝶老死菜花叢芍藥曾將菩薩面慣對翰林翁茅屋竹籬短深慚爍爍紅李羣玉與王璘聨句破題云芍藥花開菩薩面璘略不佇思曰棕櫚花散夜乂頭當階嬌拂席傍砌醉憑欄若定乘龍壻應須尚牡丹凡娶公主皆曰尚公主史王姬下嫁曰尚瑞香花盛開錦織麒麟瑞爐熏篤耨香就將相並比閣筆費平章耨農入聲石崇饒錦障韓壽愛囊香二物吾無取看花意不忘僧舍酒邉有陳雜果品中有青杏甚竒客或以為梅或以為杏因嚼一顆釅甚牙齗而止戲成一絶齗唐韻注齒傷酢也酢酸也杏與梅同譜連根庾嶺中要論名實處馬異與盧同盧同與馬異結交詩云同不同異不異是謂大同而小異同自同異自異同不往兮異不至書畫扇雨濕梨花重苖榮鴉舅鳴墨池并雪嶺此日得同行才出墨池又登雪嶺何其一日黑白不均世上無名鳥人間絶色花始知天地闊未盡入唐家唐明皇天寶末年遣使李駰採民間美女納之宫中號花鳥使李白嘗著大鵬遇希有鳥賦歲暮吟師門曽立雪親舍屢瞻雲二事事如一晨昏一炷熏春旱得雨桑田猶牧地秧隴尚蔬畦更有憂春事聲聲怨竹雞遁齋間覽云白蟻聞竹雞之聲化而為水今在處山林有之自呼為泥滑滑云風竹風入篔簹谷長驅翠浪平居然龍種異還作戰濤聲盧同詩竹林吾所愛新笋好看守萬籜抱龍兒攢迸溢林藪春雪東風猶㾕花事匕闌珊未便平平過須饒早晚寒古别離曲與郎新别離問郎來何時似嫌别時早莫恨歸來遲夜讀無油薪蠟豈豐崇囊螢何嗇胤貧固士之常書亦天所靳夜坐偶書燈晦客無寐牀空夜不眠凄涼心下事月到小窗前六言絶句東西舍語豫願鑿壁分光豫思古人有無損子明之語遂從其請戲成六言有目願見種色鑿壁幸分餘光彼量汪汪千頃我闥洞洞八荒史記甘茂謂蘇秦曰貧人女與富人女會績貧人女曰我無以買燭而子之燭光幸有餘子可分我餘光無損子明軛世説郭林宗至汝南造袁奉亭車不停軌轡不綴詣黃憲叔度乃彌日信宿人問其故林宗曰叔度汪汪如萬頃波澄之不清撓之不濁其深逺難測也郭泰字林宗司徒黃瓊辟太常趙典舉有道見本傳七言絶句上雙燕復來松篁搖落柳條新巷陌尋常易得春江左風流諸子弟也隨飛燕傍他人舊時王謝堂前燕飛入尋常百姓家王謝子弟為烏衣諸郎鄰曲親滌床頭老瓦盆自燒筍蕨當盤飱拾遺田父平生友共醉相同卧竹根春怨又見家山呌杜鵑良人飄泊幾經年去年花謝今年好間對花枝思惘然溪邊女松粉飄黃落細花高崖墜石立平沙門前一帶寒流水兩兩青裙自漚麻詩陳國風東門之池可以漚麻兩上元連年盜賊未全收夜作松明當點油上界真仙憐下士高懸明月作燈毬陳紹祖許以方竹杖小詩索之見説杉溪溪水傍幾年方竹色蒼蒼自慚不是紅顔日助我間吟繞曲廊安排鶴膝挑囊去凖擬龍鍾信杖扶此是吾儂間受用不求寫入葛陂圖李德裕贈方竹杖及再見問杖無恙否曰已規而漆之矣公嗟惋久之僕老􅖏户有客欵子持示羽客楊逢賔歸閩省親序乃天師太玄老仙筆也豫披讀數四書眼為明且嘉楊生蚤嘗及門曾未幾見遂寄蹤老子法中所謂六經外有此良友際遇公卿清譽可掬生慎勵前操必有如韓退之送張道士所云者贐以四絶少答來貺憶昔青襟牆屏間造門已見著黃冠從來孔李無殊教大道流行執兩端孔融謂李膺先君孔子與李老君同時義而相師友則融與君為纍世通家矣上界仙官戲篆文飄飄鸞鶴下層雲瓣香玩索心語口所得于今過所聞唐李淳風父播仕隋棄官為道士號曰黃冠子韓退之送元十八協律所聞昔已多所得今勝前令伯陳情世尚傳持歸數幅盡佳篇遊神句法元清淨況此仙翁玄又玄天目山頭幾葉孫入閩端為避塵喧蹉跎半世成何事又擬携家隱鹿門郭璞詩天目山頭兩乳長龍飛鳯舞到錢塘僕先世自上饒而官閩已九世矣戊寅再館壽峯重遊吳真人祠下書以二絶憶昔題詩寄洞仙稚松初種已參天道人不識飛騰術面壁看書又十年石英與許長史書曰玉醴金漿交梨火棗是乃飛騰之藥石髓重來尚未乾汲泉煮石對溪山擔頭書劒仍携幼分是間人未許間番菊黃金點綴碧叢叢不與東籬住貫同畢竟秋官員數滿朅來借注在春風八月十三夜登劉氏望逺樓玩月繡窗疏户透玲瓏上界星辰咫尺通四顧水天銀一色分明人在廣寒宫無題二八當筵舞柘枝東塗西抹賽新竒而今粉暗胭脂冷懶去翻騰十樣眉唐明皇幸蜀令畫工作十眉圗橫雲却月皆其名也橫眉碧逺山卓文君眉也對花月作花開人醉月嬋姢月滿花香人少年三絶偶然成一笑人生何處似樽前田舍曲杏花開後雨如煙燕子來時水滿川眉雪老翁芻一束肩犁扶犢出新田素馨翡翠簾櫳玊雪容內家裝東道家風裴回顧影精神爽恍是香魂返漢宫漢宫人名素馨明皇太真避暑按樂圖三絶供奉清平進雅歌梨園張樂奏雲和不知聽得新翻曲差勝名臣金鏡磨天寶中李白供奉翰林時沈香亭會木芍藥開上乘照夜車太真以步輦從詔選梨園子弟得樂一十六色李龜年手捧檀板押衆樂欲歌之上曰賞名花對妃子焉用舊時詞命龜年持金箋宣賜李白立進清平調三章龜年歌之太真持頗梨七寶杯酌西涼州蒲萄酒笑領歌詞自是顧李翰林異他學士清平調周房中之遺聲千玄宗天長節百寮上壽王公以下獻鏡唯張九齡獻秋金鏡録五卷言前後廢興上賜書褒美李白進清平詞三章見八卷末天寶中嶺南獻鸚鵡養之宫中歲久頗聰慧通言語上及貴妃呼為雪衣已副氷盆金粟瓜旋調雪水試涼茶宫娃未解君恩暖尚引青罌汲井花禮記為天子削瓜者副之音匹杜詩兒童汲井花慣捷瓶在手日晏朝回機務停雪衣口嘴許惺惺侍臣更有能言者自是無人進掖庭雪衣解誤寫在供奉清平注下雲坡李權府暇日持示畫馬及刺繡傷春二圖俱可愛索詩各書以一絶曾從平步籋雲端耿耿方曈照影寒豈但晉人存馬癖一朝三索畫圖看漢書天馬歌籋浮雲暗上馳又晉杜預為春秋傳時王濟善相馬耽愛之而和嶠頗聚斂預嘗謂濟有馬癖嶠有錢癖武帝謂預曰卿有何癖預曰臣有左傳癖坐繡香羅枉却春停針不語倍傷神此身不及雙飛燕飛去飛來不屬人寄題囊山寺海月堂舊堂回祿今復重構粟似風帆海似杯襌宫高倚碧崔嵬琴聲銷歇詩寥落滄海依然駕月來六合萬籟息秋林月正輝琴中彈不盡石上坐忘歸蔡襄我來六合正涼風壁上觀詩憶蔡公惟有秋林舊時月至今猶照梵王宫永嘉王魁子明簿書叢裏易勞生辜負林間風月清銅虎付人身屬我得來石上聽泉聲蒲守吳太博炎周廣文溥别莆且半載地逺不及奉狀適有詩自杭簡莆諸老離索之懷見於言外次韻奉謝聊發千里一笑歸時煙栁正春腴官况邯鄲昨夢餘莫問長卿山逺近逢人便問馬相如軒渠許序索詩催别後東園不寄來幾度將心付潮去夜深和月又飛來書陳希夷睡圖摶字圗南居華山雲臺觀預知死日端拱二年七月二十九日卒於蓮花峯下張超谷室中死七日有五色雲經月不散卜世勞神又卜年先生鼾息正喧喧屬豬骨冷山河換石枕簔衣尚晏然雪毬花雪裏誰將玉刻成天仙午夜集羣英醉翁眼底多清識不入無雙作伴行楊州瓊花為天下第一歐陽六一翁為作無雙亭韓李花詩誰將平地萬堆雪剪刻作此連天花憲副趙公建言鄭夾漈先生宜立書院書卷後遺文藏山草木香七略未足所見長何年縉紳遂朝請墨書飛下中書堂秀巖道人豫族子也竟未相識近養晦於翠壺之下求詩以為聞覺之助書以四絶其一問訊黃耕叟老人云巖棲得月伴晨昏蓮社相依一片雲勤禮金仙修白業翠壺側畔兩洪君佛經以善業為白惡業為黑達摩師云當勤修白業金剛明經逺離一切諸惡善修一切白淨之業豫族兄月卿長齋亦學在家菩薩梵唄微言心默解具書密義手曾抄長年分喫闍梨飯耐可全將俗纍拋梵唄謂唱和演揚而聲聞於外詩杜詩梵放時出寺李白題瀟湘云南湖秋水夜無煙耐可乘流直上天且就洞庭賖月色將錢買酒白雲邉天目山頭百丈竿戲衫卸了下嚴湍即今譜系漫漶甚相見途人一例看七里瀨在東陽江下與嚴瀨相接即釣臺也父行今誰更典刑近聞猶解主詩盟數莖留取隄防老莫苦沉吟學後生漢孔融與蔡雍素善雍卒後有虎賁士貌類雍融每飲酒酣引與同坐曰雖無老成人猶有典刑也馬援有疾梁松候之拜床下援曰我乃松父友雖貴何得失其序乎續軒渠集卷七
