body:
  text: 續軒渠集卷四元洪希文撰五言律詩詠竹幽軒多種竹繞徑復依牆月弄三分色風吹一味香空堦翻籜下隙路引稍長客至休書刺嗔渠踏破蒼古未有紙削竹木書姓名曰刺後用紙曰名紙漢禰衡懐刺無所適至於滅字又魏文帝賔客百餘人人奏名刺悉書其郡邑名氏曰爵里刺杜詩嚴鄭公宅同詠竹風吹細細香訪道士不遇翠壁無風到隂晴潤茯苓松闗終日掩香火閣黄庭地僻丹爐在雲深仙洞扃碧桃零落後衣袂帶㣲馨洗硯作小陸筆先焚牀頭破硯存石枯餘墨暈池凍帶氷痕滌去充魚腹携来就兔園草𤣥吾豈敢聊復注孤鶱陸雲與兄機書云君苗能文每見兄文輒欲焚其筆硯鶱揚雄草太𤣥有以自守泊如也鶱杜詩風雅靄孤音虚言切飛舉貌題隣居隣用萬金買情親分所宜隔牆喚拈琖炙燭戯彈碁沈存中筆談載西京雜記漢元帝為彈碁之戯有譜一卷盖唐人所為局方一尺中心髙如覆盆其顛為小壺四角㣲起李商隠詩曰玉作彈碁局中心最不平謂其中髙也拈琖彈碁皆唐人語也春看兩家栁白居易與元八卜隣詩明月好同三徑夜緑楊宜作兩家春朝蒸共竈梨杜詩蒸梨常共竈澆薤亦同渠如何陽勒輩拳手為麻池晉載記石勒與李陽隣居争漚麻池日相毆擊及貴乃召陽子酣飲引陽臂笑曰孤徃日厭卿老拳卿亦飽孤毒手教兒子鏞讀禮詩鏞字韶美敬長尊親道工夫在小兒綱常千載禮章句五言詩講習終成性周旋自中儀瓣香北溪老茅蕝請行之陳淳字安卿清漳人晦菴朱先生之上足號北溪十漢叔孫通願徴魯諸生共起朝儀扵是徴魯諸生三人西及上左右為學者與其弟子百餘人為茅蕝野外註以茅剪植地為纂位尊卑序春秋傳曰置茅蕝仙邑館所書事桑麻繁以長繞舎翠沈沈茶臼疎林隔書帷陋巷深山禽諳客况風樹助予吟牧豎来呼犢跫然空谷音謁華嚴毒海上人出城奚所適正值雨華時毒海老尊宿名山佳住持寺幽藏碧巘池暖動春澌為謝韓知客通名只用詩劉魯風徃江西投所知為謁者所阻作詩云萬卷書生劉魯風煙波十里謁文翁無錢乞與韓知客名紙生毛不為通曉行途中書事㝠發昧所適東西覺惘然門敲村店酒鐘落客津船猿叫荒山月雞號墟里煙回思在家日日晏尚髙眠讀杜拾遺老瓦盆戯作此翁坦率性長享甕頭春觴客終頽玉晉嵇康字叔夜山濤言叔夜為人巖巖若孤松之獨立其醉也若玉山之将頽然傾人懶注銀干戈塵世淚風月草堂身賴爾有蘇李情親不厭貧杜詩春復加病肺此病盖有因早嵗與蘇李痛飲情相親薄薄酒黍釀固宜薄情親意已多勸酬終不醉耕種豈徒勞交淡元無味顔衰賴爾酡明年廢東作茶椀看雲濤石屏磨琢雖云至寧非造化工飛峯横筆架立石峭屏風逺近青未了隂霾景不同仙源如可問我欲隠其中竹間鶴愛竹已成癖新添鶴有情霜毛仁者夀風韻聖之清乞母移来種將雛養得成嵗寒三益友須着我同行立秋暑退火西流炎雲宿靄収亭臯纔落葉天下己知秋律氣隨杓改蛩聲傍枕啾短檠時節到時事迫人遒玉延俗名山藥着價羞蕷芋充飢勝粥饘切泥姑少試餐玉竟誰傳蹯掌難為饌醍醐不直錢雪晴扶短鑱結伴過山前觀海門觀海難為水斯言亦㫖哉華嵩同培嶁河漢等涓埃官哨時旁午史冠盖旁午旁午縱横也吳鹽日徃来何曽瞻蜃氣重疊起樓臺禮記雉入水化為蜃前漢海旁蜃氣象樓臺獨立雨後衡門立郊坰晚氣清鴨頭流水浄魚尾斷霞頳並舎開新釀平疇餉晚耕㣲吟扶楖栗信步自閑行自述二首擾擾百年内胡為勞此生酒因愁少進書為懶無成行篤群疑息心清百慮輕篇詩聊自述亦可發幽情自述亦自笑可嗟還可憐文窮縁智困道進為心堅嵗月驚童穉雲山奪事權此身無滯礙對酒即超然信紫雲任建寧㕘軍終制抵莆莆民思其父有遺愛焉其父即中隠公也舊勞曽汗馬收附江南子復仕王廷出處㕘周易能明易操修一孝經逢人心自白知已眼終青晉阮籍字嗣宗不知禮數能青白眼見俚俗之士以白眼待之母終嵇喜来弔籍作白眼喜不懌而退喜弟康聞之齎酒挟琴造馬籍大恱乃作青眼由是士皆疾之大義明終始遲遲正竗齡連日雨不止千床渾濕透簷溜更無端馬鬛一滴誤魚頭萬國寒老天縁底泣后土幾時乾悶聴應酣睡瀟瀟到夜闌少睡少睡多宵坐占星看碧虚病根常檢㸃客氣久消除清有焚香癖臞因服藥疎眼前書未讀肘後看方書葛洪抄肘後方四卷一室雅有巢山癖誅茅葺數椽左圖右閱史春誦夏鳴絃涉畹紉蘭佩臨流枕石眠何須學辟榖且作地行仙郊行天亦自多事一春勞應詶哺雛衝雨燕喚婦出林鳩有累俱闗抱無生始斷愁忽逢林下士羞黙但低頭禁馬古人重馬政遺法著姬公羈靮豈徒設舟車有不通負乗時所忌負且乗致寇至得失理難窮塞翁失馬未必非福塞翁得馬未必非禍前輩騎牛好吾將立下風贈相士術乃法之巧求諸相益知脤觀成子惰珮識獻公離並左傳指背吾無取論心世有誰君看非相說未免半醇疵揚子有非相篇自省孔孟日杲杲吾徒甘晦沈每於供給際常有愧慚心人物有賢否山川無古今自憐居爨下疇昔荷知音龍華上人餽白粲報道龍華老驅車入市回如何迫嵗出端為餽年来香鉢停留供朱門迤􅆔開也應憐范叔莫遣甑生埃椰子冠團團椰子實解剥付冠師體製羞龜殻文章笑鹿皮色頳猶帶酒腹小尚能詩欲着東坡帽簷低不入時冠居衆形上吾獨取椰為陶令巾漉酒陶淵明甞製漉酒中漉酒畢又中之山翁着接籬晉山簡鎮襄陽優㳺嵗月惟酒是耽諸習氏荆土豪族有佳園池簡出逰多之池上置酒輒醉名曰髙陽池兒童歌曰山翁出何許徃至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒着白接籬舉鞭問葛强何如并州兒强家在并州簡之愛将也堅渾羞抹膝疎曠笑穿絲寄語資章甫今時彼一時宋人資章甫而適越越人斷髪文身無所用之鐵拄杖􅀈傀同枯枿流傳多閱人鑄成一枝杖伴我百年身觸石奔星火行氷碎玉璘赤藤尤可貴包褁若為珍韓赤藤杖歌幾重包褁自題署不以珍怪誇荒夷五字吟李陵蘇武俱為侍中武使匈奴明年陵敗陵降武歸漢陵置酒作詩為别則五言詩自陵始也其一曰携手上河梁㳺子暮何之其一曰仰視浮雲馳奄忽互相踰長當從此别且復立斯須又曰征夫懐逺路逰子悲故鄉寒冬十二月晨起踐凝霜武詩云黄鵠一逺舉千里顧徘徊胡馬失其群思心常依依世傳云五字詩自武始也武使匈奴在匈奴中十九年後竟得歸漢雅頌久不作詩壇一例荒孰云城小小能出陣堂堂髙歩闕如漆離居鬢已霜李陵非雅士安敢擅河梁穫稻雲散水㣲茫千畦萬隴黄罄腰勞日少鼓腹樂時長處處聞雞犬家家足稻粱太平本無象新釀甕頭香秋後扇齊紈裁暑扇倐忽動清商嵗月老將至巾箱舎則藏時光豈衰歇世態苦炎涼年少不長好為言姬與姜社日春秋分戊日九扈不廢職勾龍誠有功業居四民次祀列百王中黍稷祈秋實羔豚樂嵗豐豈徒臣朔飽歸遺細君同少吴置農官以鳥名官春扈鳻鶞趣民耕種夏扈竊𤣥趣民耘除秋扈竊藍趣民収歛冬扈竊黄趣民盖藏棘扈竊丹掌人百菓行扈唶唶晝民駈鳥宵扈嘖嘖夜民駈獸桑扈竊脂趣民養蠶老扈鷃鷃趣民収麥是為九農正漢武帝詔從官肉大官丞日晏不来東方朔曰伏日當早歸請受賜遂拔劍割肉歸去上令自責朔曰受賜不待詔何無禮也拔劍割肉抑何壯也割之不多又何亷也歸遺細君又何仁也上笑曰令自責反自譽復賜酒肉遺細君覽鏡戯作塗抹東西徧床頭膏沐香恐為嗔老物老物不足惜不敢近新粧翻覆百年態凄涼數寸光道心無老少顦悴亦何傷述近懐呈諸庚老與君同甲子霜鬢白於銀朋舊歸新鬼乾坤信老身干戈猶未替盤琖幸相親句法如江鮑如何捄得貧林巡檢景恵以閑散職官俾提封闕門新城詩以道意杜集有提封之作有時徴俊乂莫慮犬羊侵之句堯仁天廣大涵育最為深仗義趨王事成城賴衆心氛祅如覆水俊乂豈懐金老眼看三箭天山報捷音唐書薛仁貴為鐵勒道行軍總管九姓衆十餘萬令驍騎挑戰仁貴發三矢輒殺三人軍中歌曰将軍三箭定天山壯士長歌入漢闗九姓遂衰對悶書事時危百憂集老退一身輕鼔角聲悲壯城池勢險傾柝繁嚴守備傳遽急行程周官行夫掌傳遽事乃使車之急者起看天河色何當見太平送侯㕘軍公讓秩滿歸三年江漢水潔白不緇塵糾群紀綱正杜送韋諷上閬州録事操持紀綱地注録事者一州之紀綱也持韋蘇州送馮著任廣州録事繩墨不易是也親民條件新輿人同此誦檐子不妨貧識取至公論官中竟一人上元日居城南書事城南讀書地杖履徃来通菽水初心遂禮記子路曰傷哉貧也生無以為養死無以為禮子曰啜菽飲水斯之謂孝糟糠晚節同役車行業業詩采薇戎車既駕四牡業業豈敢定居一月三捷業壯盛也眠鼓聴逢逢韓詩不蹋曉鼔朝安眠聴逢逢踰七又望八癡頑笑此翁郡倅敬齋公乃嗣自江西省奉檄便道省親小詩奉謁郎君拜家慶捧檄綵衣榮别駕行寛恵同寮服老成珠瑰迷重寳蘭茝襲芳名此去扶搖便冲天九萬程癸已新春作盜賊生涯困回頭盡戰塵春来長是病老去不如人屋小香常集杯深酒尚醇何時洗兵甲同作太平民七十四吟視逺茫無見言哤聴不聞病於老偏厚眠向坐中分俯仰皆為累披吟不廢勤偶逢强健日浄几一爐熏白居易詩病與樂天為老伴為坡詩惟有病相尋空齋老伴暖足婆寒冬夜無寐輾轉漏聲長只熱一瓴水能銷萬瓦霜温柔聊自適趨附固其常更有孟光在髙年不下堂寄潘茂别後聴鳴艣君曽有宿期如何三閱月不寄一聨詩獨立海山對相思沙鳥知端能乗興否一葦諒非遲壬寅元日老天何省事元日又逢春盤飣青蒿細盃浮緑醑新兒孫長滿眼天地一閒身誌喜有新作猶疑筆有神五言排律雪榦上人過訪諸山尊徳望三會老禪宗倚席聞𤣥論抽筳發鉅鐘憩松經露滴坐石履雲封山好遮来路塵牽絶徃蹤懸車留雪澗築室傍梅峯髙士幽禪着僧伽太白逢平生能事足竒遇素心從二民相為用如聆空谷跫韓讀墨孔子必用墨子墨子必用孔子不相用不足以為孔墨輓仙邑陳小山先輩吾慕小山翁仙溪一鉅公奉親嚴髓滫焚券恤貧窮􅀈鄂相輝日閏門正始風彼徂岐可路不霽水何虹嚴氏詩集作彼徂矣為句絶岐有夷之行千首牛腰重三封馬鬛崇鄉鄰盡焦土䇄立負羈宫邑廬盡為焚毁後亦為賊所焚續軒渠集卷四
