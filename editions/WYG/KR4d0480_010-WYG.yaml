body:
  text: 續軒渠集卷十元洪希文撰雜著瑞芝銘并序楓林興教里中士人陳天應後圃産芝二莖命工圖形以傳厥後莆士夫咸為歌詩以偉之然僕所云瑞者必近取諸身是謂美之實也其銘曰攝提之歳月揷辰斗芝産二莖東崖西畆莖葉如貝盖黄如黈有疊其稜有咸其栂色黄為中數二為偶蕪穢不薙雜生藜莠曰華而實陂也芰藕曰根而實松柏部婁和氣禎祥薰蒸矯揉宜兄宜弟令妻壽母共為子職饋養左右仰事俛育靡間前後麟鳳鳥獸羽鬛飛走聖智愚庸耳目鼻口非芝惟芝天地情偩非瑞惟瑞倫紀恩厚黄耶紫耶理也不朽蓋耶莖耶中也獨受底豫顧養怡愉瀡滫歸全順令守正毋苟脩身齊家恱親信友善不外來福自已取行脩家庭瑞應林藪我辭匪佞用賛悠久陳有繼母情樂記樂偩天地之偩依也祝文興化縣主簿曹古心謁孔廟某官古心下車之初謹謁于大成至聖文宣王曰莆小魯也游洋為支邑猶魯之闕里歟古心向轄頖宫周族爼豆今貳兹邑忝領民社仰視㳺夏愧赧多矣然學道愛人見小欲速之訓則嘗聞於夫子安敢不勉興化縣新建廟宇塑聖師像惟王教垂萬世道貫百王金聲玊振有紀有綱矧兹十室僻介一方廟宇聿新籩豆就行巍巍當座黼黻冕裳天開日明文化大昌抑亦聖師之靈吾道之光降香祭湄州林天妃祝文維年月日郡守某等謹聞之祭法曰凡法施於民禦大災捍大患皆所當祀海之為物所繫尤重捍禦之功非神其誰尸之閩距京師萬里聖天子嘉恵元元親册連率牧守俾宣徳澤罔有内外又常選用重人奉香祇謁祠下以顯厥靈敬神愛民恩禮兼至神其鑒之神於海道嘉績顯著神之衛民可謂勤矣而褒崇徽號寵命三錫國之報功亦云禮矣某等謹率僚屬肅將祀事其有樽爼豆籩祝幣牲酒罔不具備爰命吹擊笙鼔以侑馨㓗其詞曰南海之墟宅祝融湄江之島神所宫大海盪泊傾魚龍神靈秘怪無不容陽開隂闔相撞舂轉禍為福須臾中海波安流天無風漕引獲利舟楫通中流失勢黙禱穹大莫大兮更生功聖朝寵遇恩數隆徽加懿號神次崇天香下繞雨露濃神降倐曶來無蹤禮嚴祀事賓屬從修陳爼豆酣笙鏞神具醉飽年穀豐民不疫癘時和雍國與咸休期無窮聖墩宫天妃誕辰箋加封靈慈廟額星臨寳册攽宸極之絲綸春盎瓊巵長仙宫之日月耄倪交慶海嶽􅆒休臣某等誠懽誠抃頓首頓首恭惟宣封䕶國庇民廣濟福慧明著天妃維國忠貞為民怙恃先駈融若作渺海之慈航後列英皇奏鈞天之廣樂羣生鼓舞百祀光輝臣某等俯効葵傾仰詶樾庇霞裾雲佩肅帝子之觀瞻壽水壺山效封人之頌禱臣某等下情不任激切屏營之至謹奉箋稱賀以聞臣某等誠惶誠恐頓首頓首謹言趙簡子夢與百神逰於鈞天廣樂九奏萬舞其聲動人永福院謝雨朝念觀世音暮念觀世音久依玅果東洋大海水西洋大海水並化甘霖早禾収銍艾之功晚稻有傑苗之望神通如是報稱云何向來一瓣香為十雨五風而讃禱爾時七寳盖作四時八節之津梁謝馮西美補毛詩齋長啟八乂玅手擅賈馬之雄才一介晚生忝何韓之近姓謹羾尺書之敬敢干丈席之嚴共惟某官地位清高天資發越真士林之翹楚富學海之淵源昻然之志趣不羣馮衍素稱人傑籍甚之聲名第一馮京克紹祖風朅來佐教於莆邦喜見横經於芹泮盟持牛耳斯文不在兹乎兆協鱣魚先生自此升矣某箕裘世業筆硯寒儒患讀書之不多使誦詩而未達雖過庭有訓粗能識鳥獸草木之名恐以文害辭未免泥魚兎筌蹄之跡過蒙齒録愈重背芒已看翡翠未掣鯨鯢政頼師資之訓欲駕駑駘而追騏驥尚煩鞭策之勞莊子外物筌者所以在魚得魚而忘筌蹄者所以在兎得兎而忘蹄注蹄兎罝也可以獵兎而擊兎脚才杜詩争看翡翠蘭苕上未掣鯨鯢碧海中温庭筠思艶麗工於小賦每入試押官韻作賦凡八乂手而八韻成修木蘭陂化石䟽壊陂當復已如兩黄鵠之言刻石未成尚欠三犀牛之力睠此木蘭一所肇於錢李二家水之利也無窮物之久也必弊囘狂瀾而力障既堅砥柱於中流奈巨浸而成淵復决隄防於南岸雖已藉土培而壅䕶然亦須石甃則堅牢至無脛來無鞭倘不吝千鈞之費舉為雲决為雨殆將興數斗之謡一時之費不貲萬世之功永頼前漢童謡曰壊陂誰翟子威飯我豆羮芋魁反乎覆陂當復誰言之兩黄鵠秦李氷為蜀守作石犀三以厭水精袤杜石犀行白公穿渠引涇水起谷口入櫟陽注謂中三百里溉田四千五百餘頃民歌曰舉臿為雲决渠為雨涇水一石其泥數斗莆田縣修薛簡肅公亭䟽亭在池中央鳴琴百里之地有亭翼然列㦸數仞之牆其華灼爾以簡肅之賢而樂於濓溪所好則同四壁且看芙蓉一縣旋栽桃李露臺必用十金産谷費云如之何戴樓若沒一文錢鑿空豈能了得幸有㑹稽楮先生為之饒舌白水錢真人為之㸃頭庶囘一日新功可作百年佳話開亭萬工費載歌潁濱蘇子之詩修廟百貫貲大書昌黎韓公之記壽峯吳真人漳江行香囘祠正直聰明既達真而證聖慈悲哀憫宜降福以垂恩食兹土既克永年鑒厥初而伸𢎞願過十長亭望五里堠豈憚逺行持一寸草報三春輝敢求多祝知神明可厭魑魅除燥濕而昧帡幪形道士心浮屠栁郭筝師銘悟如來之真覺傳燈録一鉢歌胞吾民物同與西銘廣太上之好生東溟追薦本師北溪和尚茶䟽住梅峯承宣開講席相州人號太平大椿八千歳人生幾何寸草三春輝天倫一耳須慿願力來赴道塲恭惟方廣寺衆真鉢盂毗耶城諸尊旛盖鑒兹心造示有指歸痛念某先師榮禄大夫大司空前住當山北溪大和尚望闕承宣開山闡教廣宣經論發揚大乗宗風一種師僧彼此横枝法嗣爾時素重因果我等惟極追嚴伏願稽首十方寸心千里細論水品豈但中􅍽泉香滿瀹月團共證天台路近黄梅謂道信師曰和尚化後横出一枝出傳燈録法嗣旁出為横枝寺觀祈雨䟽農告予春方興穡事天瘨我旱莫僣秧時頃甫息於鸛鳴已不勝其狼顧况甲以交馳之赤白而當此未接之青黄民不聊生吏將安仰爰瀝陳於丹悃願垂憫於蒼生蘇其焦枯沛以霡霂雲雷變化足春畆之犁鋤宇宙晏清洗天河之兵甲三山清泉寺檀越記佛刹有記紀善也檀越有記紀功也翁氏捐已田立常住此記之所繇作也翁官族世居上饒今玊山墳墓猶有存者曾祖丹山合析居建寧以詞賦鳴為閩佳士暨良甫居福唐即其後裔閩壤肥衍有山水禽魚之樂民物富庶實雄東南古候為支邑負郭西五里許有山飛翔若鳳鶱翥舊曰清泉肇剏五代季閱五百餘䙫天迴地游襌宫銷歇其租斛不供饘粥寮舍不避風雨僧行牢落檀越蕪穢向之金碧竟成瓦礫前住清溪某披荆草剏靈光巋然未迄于成南山師某繼領兹席諗于衆曰兹宇多厯年所棟宇傾撓加以歳入微薄非巨力檀施且壊一旦白佛下山以恢前規囘舊觀為事勸化諸方得郡善信翁君偕内子周氏發菩提心咸願捐净財重剏山門搆法當翼兩廡飾殿宇粉墨漫漶粲然一新復捨田若干頃入常住為供香鉢百廢具舉靡有缺典如旱得雨如闇得炬象教頼以不墜耆宿某曰兹泉復清翁之力也否則吾徒救頺波承末流之不暇尚奚復舊哉向微南山孰開其端非良甫孰起其廢豈非興廢有數勸化在人使來逰來觀目擊心悟雖寶坊金界亦不外是是皆可書若夫鳳山之勝則接西禪平林逺瀬映帶左右扶輿清淑之氣盤礴四出翁氏暇日即寺之後山卜蠒室植杉柟檉檜以為異日得長生修真之所僕既諾僧請然一行作吏此事久廢且於良甫有同鄉之雅又焉得辭僕老矣方且涉浙江踰閩嶺為五斗折腰與世相推移尚未知何日能如翁君結束身事因自慨而為之記某年月日承務郎興化路莆田縣尹楊某記故河南隱君墓誌銘士固有修身遯世而無悶為鄉里稱善人者吾聞其語矣未見其人也游洋有隱君子者其斯人歟隱君諱環子字仲玊系出莆田之方山子孫散處不一惟游洋之壽峯聚族尤為蕃衍九世祖諱次彭仁宗朝擢皇祐第官至中奉大夫知梅州軍事天寵眷遇王官褒嘉至今耀人耳目八世祖諱原道循州龍川令綽有能名迨髙曾之世州佐邑宰代不乏人詩書之澤猗歟盛哉隱君生於宋淳祐庚戌十月初八日卒於皇元泰定丙寅八月廿有二日享年七十有八始八歳蚤孤鞠母林氏零丁孤苦教以義方少長懷竒負氣不屈人下暨年弱冠人世更新官族銷歇林棲穴處惟恐不宻隱君披荆榛立門戸珠纍黍積為風雨饘粥計於此時兹惟艱哉前配知縣黄公女繼配林氏謝氏有二丈夫子皆黄出也伯曰喜孫蚤世娶杉溪陳貢士孫女男一人太冲女三人皆幼冲娶相溪陳氏延平教官陳世英侄女女皆適望族冲有子尚在襁褓曽大父所不及見者仲曰嘉孫娶蕭氏蕭幼嬪于方事舅姑孝克職中饋男二人曰潛曰淑潛娶侯山陳氏女淑年甫志學女適農卿陳公裔僕嚮辱隱君知歳延祐間設帳郡庠囑其孫潛負笈聽教誠意特厚歳戊辰乂以塾客聘予至則見其季曰淑者淑亟拜床下授經史暇罇爼時接慇懃雍雍愉愉知其家法盖有自來嘗從容語及翁平生真率皆人所難能者冬裘夏葛必斥華美盂飯盤蔬寧甘澹泊豈不靳靳乎其難哉暨予登君之堂隱君已修文於地下矣惜夫天厯己巳其孤嘉孫卜㠯二月九日奉柩窆于大松乾山辰戍之邍遣其子潜淑為大父徵銘於予予於二子有同道之雅其可以名位辭銘曰有子負土有孫丐銘式穀來裔永徵幽冥故濟南徵君墓銘陽城林仲堅將塟其父踵門乞銘於去華洪希文且曰林為莆著姓載族志書髙祖諱某帥幹曾祖諱某節推以儒學顯稱為時傑祖諱某有隱徳居田里坦坦施施為衆表則父某少頴悟日誦萬言隨叩隨應從大父過寧海鎮謁洪翁祖年一目竒之許妻以女實吾母洪也男三人長孟洪娶王氏次娶薛氏女適西洲吳氏洪蚤世生佛力娶玊湖顧氏女晚營菟裘於南山南溪為歸老計諸孤以隂陽星厯之說弗即遄𦵏嵗月逾邁髫穉老醜仲堅逺舶海邦閱八寒暑歳辛未布帆南引欲奉骨松楸值海道多難弗遂改卜以某年月日奉匶同母洪穴此志幸就舅氏辱而賜之銘是與我後嗣以不朽也予曰惟孝可動天地感鬼神何逺弗屆且雕題交趾文身左衽者獨無父母乎追念吾翁恩重骨肉兩翁聚首各忘所趍吾翁性不憙飲每受靖節止酒篇而翁日與歡伯從事毎愛香山酒功頌携二李帖帖坐諸生下翁口講指畫談造理致而翁必為首頷予於仲堅童年相若俱不觧兩翁意今顔髮蒼皓覩前事如隔日悲夫且予於孺人為從父弟延祐間嘗誌其窽後十餘年復秉潜筆其可􅇺兩翁於地下矣遂詮次其世系以傳永久固宜書徵君生於某年卒於某年享年若干其𦵏實至順三年臘月八日也莆田合浦等二十八里軍需塔䟽普天率土敢云傷已之財助國勞兵是謂遵王之義况大帥已伸其敵愾而衆心自可以成城伏念某等𨽻在編氓加之里役見朝野昇平之日久遇盗寇猖獗之風生至使雞犬皆無所寧乃令狐䑕肆行其害不圖餘孽復逞羣兇􅋇面繫首以歸敢干國紀殫地竭廬之入悉助軍需荷官府所派之重輕依户役已排之分數無州黎高下其手有元結惻怛之心莫不欣從允為當論兵㐫器也用之其鷹揚乎盗逆儔焉咈之則犬狺也若凡行李靡屨之經吾土皆簞食壺漿以迎王師河海揚清風雷蓄怒奮迅掃空其窟穴妖氛偃息於㭸槍播奏凱歌勞還歸士兹盖伏遇某官某等仰干洪造俯荅恩私伏願星在北戸河漢西流幸垂庥貺水擊南溟鵾鵬摶上各遂修程續軒渠集卷十
