body:
  text: 吾圃翁軒渠詩原集散落不全其幸存者唯此三詩二序耳附録以備後考賀祖母吳氏生朝呉魁君謀之從姊年九十六四如監簿誌其墓在後泮門右今朝列帨巾稱觥拜舞對爐薰兩髦暗合姜自誓一味必為孫割分王羲之九十六年今罕見二三百歳古嘗聞丁晉公語樽前喜極還生感安得萊衣笑語欣先祖記玉樓矣希文請名其齋扁之曰緩葢取先賢勤謹和緩四事之一為賦一首古人示戒有弦韋取義名齋汝盍思怒在七情非易制狂於三疾最難醫聖師氣象温而厲君子儀容舒以遲一字書紳常自警宛如人誦武公詩希文枕邉談詩謂律詩易工夢中猶與之辯詩以折其非既覺忘其數字因足成之此下篇多不全至此篇亦末二句不全惜哉此後篇數有空白即是破處七步成詩語近諧壇荒李杜乏竒才僧敲未敢一言定鳥過曽安幾字來再題軒渠後集徳章詩意新而事切句妥而對的儻假歳月亹亹逼樗翁矣惜夫七言如自勉緩齋與希文談詩五言如擇交謹獨示兒等作身法家教盡在於是韻語云乎哉希文類藏于家材智豈下人者徳章雖亡不亡也至大戊申立夏聱翁七十八筆此戊申乃元武宗至大元年又序三笑圖中着一詩人詩家固有笑也然而笑正自難賈大夫不能射雉不足以動其妻况他人乎吾圃洪先生莆士巨擘蚤有賦聲得雋塲屋本出於古詩之流今觀軒渠遺藁造語清新擇料亭當復以體物瀏亮之製發為縁情綺靡之章使人一唱三歎永歌不足不知手之舞之足之蹈之者而為之軒渠今其子緩齋紹聞衣徳言闕先生必含笑於神清之洞曰予有後弗棄基闕家之叔黨鄧禹不得而笑人矣東坡子蘇過字叔黨元延祐第五戊午長生節日燕山阿嚕威書于莆陽
