body:
  text: 續軒渠集卷八元洪希文撰七言絶句下張參軍克明席上出歌妓踏筵主人索詩贈之口占一絶歌喉圓轉聨珠貫舞袖郎當散綵霞記得樂天詩句好醉嬌無力牡丹花禮記纍纍然端如貫珠張坡詩雖無窈窕人清唱弄珠貫建封僕射節度武寧舞妓盻盻乃徐州竒色公納之燕子樓白樂天經徐與詩云醉嬌無氣力風裊牡丹花間適看書無味又看山門對雲林盡日間俗客不來無一事只將詩酒自怡顔寄題化邑剛中上人南湖十詠詩卷後秀色凝眸若可餐前修講道此交歡世人自不能容物却笑空門布袋寬彌勒峰山蹊荒徑草芊芊幻影雲空思杳然自是至人塵垢滅一潭寒玊泠無烟沭佛潭神物蜿蜒黑處蟠興雲致雨執其關雖然變化通冥漠來就高僧叩大還蟠龍窟需老當年别此峯山空鬼哭道場空闍梨不及於搜智獨守空山幾劫中伏虎林城西晚步携小兒書所見鄰牆請火草燒緼旋買新芻洗瓦盆招得牛醫無管待伏雌生瘠當盤飱前漢蒯通傳里婦夜亡肉姑逐婦諸母即束緼請火於亡肉家值狗爭肉婦得還家乍見長魚衝壑去又逢白鷺入城來明知不是池籠物似我奔馳有為哉池魚籠鳥見潘安仁秋興賦鵬魏皓李翰林集序云橫海鵾負天豈池籠縈之欵竹携壺過略彴吟梅折簡召嶙峋短靴低底誰知我且作遊山弄水人晉司馬宣王討王凌面縳水次凌謂王曰卿直以折簡召我敢不至乃引兵來耶王曰以君非折簡客也書傳德陽教授所居精舍前宋登科洛陽城裏玊川宅光範門中宰相書何事春風渾忘却莓苔還似野人居發蒙指畫之無教小兒吾伊半日出聲遲九經四十八萬字何日談論底藴時黃山谷夜間對窗孫元忠誦書賦作竹枝歌南窗讀書聲吾伊北窗見月歌竹枝曲有辭有聲辭者歌詩聲者若羊吾夷伊那何之類白居易生甫七月其母教之之無字雖百指不差老慵安眠得法江河運坡詩安眠海自運即道家還精補腦之說自唱無酬風雪間白樂天與元九書云梁陳間率不過嘲風雪弄花草而已不是相遭皆淡泊如何消得鬢毛斑萬事無營已雪顛黃庭一卷足長年金丹九轉工夫密荆棘不生身自仙古歌九還七返三五一龍虎相交入塊室灰池熖灼天地精金液還丹功了畢藥真誥載王夫人與許長史書交梨火棗此乃飛騰之君心中猶有荆棘相雜是以二樹不生可剪除否幽居柴門掩斷徑生苔坐閲東君幾往回看盡床書無客到殘花風送過墻來投老安間世味踈深深水竹葺幽居床頭昨夜風吹落多是經年未報書怪石欱噴雲雷來月窟翥驂虬鳳下天台漢唐池館多禾黍何似山林卧緑苔詩周大夫行役至于東周過故宗廟宫室盡為禾黍夜起聞蘭坐至三更方就枕為賦二絶百草離離感異芳時乎不遇亦何傷誰人筆底有香字請為猗蘭續後章孔子厯聘諸侯莫能用自衛返魯隱谷之中見香蘭獨茂喟然嘆曰夫蘭王者之香今與衆草伍乃止車援琴作猗蘭操云香透踈簾夢自知斑紅健碧鬬清竒絶如惠可初尋佛半夜中庭立雪時二祖名惠可以求佛法立中庭雪齊于腰病眼少蘇巖電今朝幸瞭然邇來一月廢書眠問天乞得明如月朗誦今生未見篇野興乾沒無營懶出門殘書束閣且開樽此生似與渠無分得意開時眼便昏得利為乾失利為沒翁張湯始為小吏與長安富賈田甲魚叔之屬交私懶起香冷衣篝燼冷灰酒銷斗帳曉星催詩鈎搭在櫻桃樹怕雨飄殘哄下來老病昻藏被酒欺癡兒頑鈍曉書遲扶頭送得出門去已是黃雞粥熟時過登春臺書事至正丁酉郡守雪莊公重創亭我來弔古土成堆刻桷題名夢已灰欲問前朝興廢事鷓鴣飛上垝垣來前朝名公登第咸刻名其上燒香偈子二絶不學瞿曇不學仙暮年轉覺道心堅老人自有安心法深炷爐熏斷俗緣圓澤禪師謂李源曰俗緣未盡慎勿相近醉舞狂吟憶少年逡巡七十已華顛粗茶淡飯隨緣過細讀黃庭內外篇黃庭經內景云脾神常存乎魂庭晝夜存之可長生魂即黃也春隂二絶衣綻重瞻桑沃沃食空還喜麥芃芃誰知飽暖生民意只在春隂春雨中桑扈知時勸課頻竹雞帶雨殢行人為言農畝耕桑者何事不知桃李春扈亦作雇爾雅桑鳸竊脂春秋九扈為九農正贈龍華橫海老襌說有談空復造𤣥從來高士著幽襌六經外豈無豪傑始信天中别有天行腳東南大海波瓣香參禮諾詎羅歸來誦得湯休句鴈蕩龍湫雲雨多西域書阿羅漢諾詎羅居震旦東南大海際鴈蕩山芙蓉峯龍湫唐貫休為諾詎羅贊有鴈蕩經行雲漠漠龍湫宴坐雨濛濛之句首夏翠柄纎纎裊鹿葱石榴明艷帶猩紅繁隂剗地難幽獨須倩竒花暖碧叢東溟講師主緣囊山梵王宫殿輝金碧佛子幡􅓚竪綺羅迎得法筵龍象去辟支巖下笑呵呵龍象出佛書謂有力可負荷者能維摩詰云辟如龍象蹴踏非驢所堪達摩云此僧中之龍象劉禹錫雙檜詩云龍象界中成寶蓋信雲坡權府遊梅峯僧舍觀牡丹韻包藏炫耀已全開卯酒初酣露醉腮要識本來真靣目請從花地問如來書城西壽藏文筆峯高閣暮烟市橋山崦接西邊撒開甲子百二十且住人間作地仙寒食途中書事去年召募赴霞城塵暗貔貅百萬兵又是去年去時節數聲啼鳥斷人行二月梅花奪得氷姿過歲華逺離塵垢逈堪誇即今年少多脂粉只恐春光不稱花辛未館洋尾李氏主人西隱出示族譜自談族譜之盛俾書其後云唐李難將庶姓同族莆支派有由從江州郡王𤣥元老子稱皇帝幾擔擔來桐葉封成王與唐叔虞戲削桐葉為圭以與之曰以此封君周公曰天子無戲言遂封虞於唐春晴鷓鴣聲歇日曈曨山谷溪橋暖信通花栁村村自生意青鞋布襪逐春風溫故長途瘦馬遍馳驅時不來兮一束書四十餘年心力瘁而今熟路駕輕車訪僧不遇厭踏紅塵滚滚中晝長來此聽風松溪深畢竟浮杯渡門倩白雲封幾重故人餽麞久啖蕪菁分寂寥故人分似意迢迢并刀淺割香臕膩幾載深山食藥苖瓶中梅花為恐寒林凍雪侵朅來棐几伴間吟世途噂踏誰知已賴有梅花識此心評梅花賦并序豫幼讀皮學士桃花賦皮嘗譏宋文辭婉媚不類其為人豫以為然常恨未見廣平之為賦也暇日搜索羣書因得寓目觀其顛倒困躓厲志自許於此有以破平生之疑焉蓋廣平之作非徒賦也所遇厄窮而不憫非斯人歟思而不怨正得楚騷之體為各賦一絶以俟來者甘遁荒崕寂寞濱不隨蘭蕙入芳塵厄窮不變平生節餓死商山僅一人評桃花賦梅花賦體恨輕清賦就桃花要入評妬女艷姬多㸃汚桃花千載恨難平雨過山行書觸目日暮雨晴雲出溪泓澄九折净無泥渴虹下飲喉吻動隔影雙雙啼竹雞至正庚子十一月二十七日夢中作子嘗暇日讀前賢夢中得句或覺而足成之常以為迂忽於是夜夢與前埭林學成相聚視其書几上有二絶句以釣魚為題中間有小魚巨鱗為韻豫語曰小鹿角為小魚以金鱗勝巨鱗輒書一絶以遺之既覺而忘學成二絶不知胡然作此語也書以記之烟波蕩蕩寄間身筐筥携歸色似銀莫笑江湖釣竿子擔頭掛得兩金鱗監郡公誕晨口號二首昨夜鈞天現角亢夀星台星側畔助輝光偏為天下蒼生福於萬斯年壽萬方翹企長安捧壽巵華筵遲後未為遲詩翁何以為公壽吟得新詩當壽儀問訊泉上人釋門老年相先後各華顛二老風流豈偶然約到松林間半日茶烟輕揚落花前豫耋耄之年己巳仲冬前一夜枕上半醒睡作甚矣吾衰只自知揮毫頓減少年時回思四十年前事翁季燒燈夜煆詩續軒渠集卷八
