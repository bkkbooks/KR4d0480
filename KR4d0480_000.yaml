body:
  text: 續軒渠集目録别集類四元卷一五言古風上卷二五言古風下卷三七言古風卷四五言律詩五言排律卷五七言律詩上卷六七言律詩下卷七五言絶句六言絶句七言絶句上卷八七言絶句下卷九詞調卷十雜著臣等謹案續軒渠集十卷元洪希文撰卷末數頁則其父巖虎詩也巖虎詩名軒渠集故希文集以續名然軒渠集斷爛不存故托其遺詩依伐檀集例載於末前有希文自序嘉靖癸巳其七世族孫紹興知府洪珠請山隂蔡宗兖刋定宗兖序稱其以山澤之臞出山澤之語譬諸夏鼎商鬲華采雖若不足而渾厚朴素之質使望之者知為古器今觀其詩純沿宋格於元季華縟之風明代堂皇之體迥焉不同而清遒激壯亦足落落獨行也巖虎字德章號吾圃莆田人宋末嘗為教諭希文字汝質號去華亦嘗官訓𨗳云乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀續軒渠集原序續軒渠集者洪西淙公祖遺之詩稿也一日出其稿以示宗兖且曰是祖父子俱以詩鳴父詩曰軒渠集子詩曰續軒渠集父集蠧爛不存子集楮墨僅具子孫微意謂梓傳庶幾可久惟君子公心酌之豫未視其集無以應也既翻閲數日乃復于西淙曰是儒博學而志於道者其發之聲詩所謂以山澤之癯而出山澤之語也譬諸夏彛商鬲華采雖若不足而渾厚朴素之質使望之者知為古器而自泯其雕巧之心也盍梓之以訓厥宅里西淙曰惜父集之無傳也豫曰父子一至祖孫一德子有文則可以知其父孫有謨則可以識其祖嘗聞軒者開也渠者大也胸次悅豫之義東漢薊子訓之方言也故父子相賢一家之軒渠矣祖孫相賢奕世之軒渠矣謂軒渠之義見於詩章則可謂詩集盡夫軒渠之義則不可也天地聖賢之心不能盡載方䇿而父子軒渠之志公何獨得於意外乎西淙莞爾而不言續集詩五百餘首今抹去一百三十五首梓行四百三十五首類分為十卷外附刻一卷作軒渠集者名巖虎字德章號吾圃續軒渠者名希文字汝質號去華山人俱宋末元時莆田人西淙名珠字玉方二儒之七世族孫也今為紹興郡牧嘉靖十一年嵗在壬辰秋七月吉山隂蔡宗兖序續軒渠之作始於天厯戊辰館於遊洋夀峯方氏也方氏子淑年未志學豫以講習餘力覃思於詩嵗頃得律詩及絶詩古詩長短句五百首方氏子集以示豫豫目閲舊稿時有佳處亦不可盡謂村舍學堂中語也因追念先君子晚嵗試校遊洋琴書日永燈火夜闌翁季談及此事翁有軒渠卷帙行于世視豫斯作往往竊肖之然未免有具體而微之嫌兒子琦執筆侍而言曰請名以軒渠續集可乎豫曰汝大父之學我弗敢言今汝之請似也然續之義談何易易昔太史公執其子之手泣而言曰豫先周室太史也至於豫而中衰廢聖德而不載滅賢士而不述汝復為太史則續吾祖矣厥後史遷卒繼其志成其業以永其傳必如是然後可以言續談何易易吁今豫兹編使具眼者見將有貂不足之誚又安敢學漢延夀先賦靈光耶筆以授之且以志吾過云洪希文序
