body:
  text: 續軒渠集卷二元洪希文撰五言古風下枕簟入林僻朱夏困蒸鬱城市多淫哇閒招嘯雲侣來食山中霞山中有何好泉石端可嘉清溜接筧筒火種憐菑畬音賖南方爇草種田曰畬不事水耨惟尚火耕又荆楚畬田燒榛種田也先縱火熂爐候經雨下種歷三嵗土脉竭不可復種藝但生草木復熂旁山爾雅一嵗菑二嵗新三嵗畬熂音餼枯松偃澗壑赤日流丹砂茂林無珍禽眢井空歡蛙桃笙寄憊悶菊枕便昏花煩襟頓消釋密䕃爭交加羲皇有神交蘧廬等仙家莊子仁義先王之蘧廬也止可以一宿不可以久處久坐令人健微吟到日斜浮雲滄海狗岐路常山蛇杜牧詩云常山蛇陳勢縱橫祥颷偶披拂哀音餘摻撾曹操聞禰衡善擊鼓乃召為鼓吏因大會賔客閲試音節諸吏過者皆令脫其故衣更著岑牟單絞之服次至衡衡方為漁陽三撾蹀𨄌而行山深民多醇鄰酒亦易賖去去下巖扃歸途暝棲鴉韓退之題張十八籍所居蛙歡橋未掃蟬嘒門長扃效韓退之柏石翠柏雖云小已具棟梁氣鬱屈龍蟠泥匼匝蚖同肆肆區也石吾所甚愛山骨鍾竒怪頑然苔蘚面不帶嫵媚態柏生雖云艱幸免斤斧債柯堅節磊砢惜乎其未大少讀種樹書膏盲遇蝦蟹遂令木石性至老猶未懈吾言柏與石二者相終始石以成其髙柏以濟其美卑哉櫟社樗蔽牛徒為爾蝦蟹善發疼癢之疾人韓退之送石處士詩長把種樹書云避世士忽騎將軍馬自號報恩子呈段郡守為學不至穀出仕不願祿此道古所難聖賢常不足嚮緣汝南評誤蒙君子録處置童子師占畢久局促學記今之教者呻其占畢多其訊注呻吟畢簡訊問衰遲舍學校挈挈焉歸宿養士不及賢何異推舟陸皇天惠仁侯文翁新化蜀下馬坐頖宫頽瀾生淨緑東閣踵傑魁詞場巨眉目龍文萬斛鼎異日薦公餗令人想風采快覩烏可卜所願立下風謦咳聆珠玉探袖出瓣香齊宿三熏沐起著主衣裳持作斯文祝汝南許劭與從兄靖俱有髙名好共核論鄉黨人物每月輒更品題故汝南有月旦評嘗新橄欖橄欖如佳士外圓內實剛為味苦且澀其氣清以芳侑酒解酒毒投茶助茶香得鹽即回味消食尤竒方宫商舌底發星宿胸中藏雖云白露降氣味更老蒼山林假嵗月顔色饒風霜以兹調衆口誰敢輕頡頏作此橄欖詩逺繼葑菲章大器當晚成斯言君勿忘夏政齊權府辱示書韜集擬古奉謝古云文章家性情鬯風標大雅久不作繁聲竟何聊吾觀政齊詩重可鑽青瑤髙從霞鶩邉逾覺仙氣飄深如汲修綆快沃火釜焦厚如食河豚著腹腴未消和如大鵬翽而惡雄鳩佻平如厭禁靺而以奏雲㲈跣足往從之入笠懼見招昔我未見止䕃蔚困塵囂今我既見止伶俜快梯颷我思日以枯素秋隕黃苕我有緑綺琴汝以鵾絃調我有木蘭舟汝以薜蓀橈終然愧鶉鷃安敢攀鳳條李白詩大雅久不作吾衰竟誰陳石者難為功杜詩梯颷颭伶俜前漢鐫金文選古猛行少年惶且怖伶俜到他鄉注行不正貌颷扶搖風也離騷雄鳩之鳴逝兮餘惡夫佻巧唐賀懷智以鵾雞筋作琵琶絃用鐵撥彈同漢律厯志萬物條鬯暢再書阿鼎示贈二篇後英物生世間多見少小時晉桓溫傳溫未期而太原溫嶠見之曰此兒有竒骨可試使啼聞其聲曰此英物也鼎也方八齡示贈形歌詩贈以開其端示以防其馳失學何責子陶責子詩對客何譽兒唐書王福畤有譽兒癖開端用激勸防馳存針規伯魚過庭日指示無異辭諄諄面牆誨或恐中輟之有子誰不愛恩教當並施教者必以正恩以全吾私古人易子教孟氏豈我欺忠焉能無誨此語聞仲尼書黃學録喬年秩滿障子吾邑有東里里中有東丘父作子述之古昔誰與儔惟此兩夫子家居僻窮陬終身談仁義不肯干王侯詵詵魯多儒鮮不沿其流在寢皆淵騫揚子法言或問淵騫之徒烏乎在曰在寢或曰淵騫曷不寢曰攀龍鱗附鳳翼巽以揚之勃勃乎其不可及乎如其寢如其寢出入皆鳴騶祿食不滿德厚種宜有收馨兒溉其根採掇未足酬書澤演且迤衮衮來不休君家好兄弟克紹箕與裘左手持宿劵天意應所求三年領學校器博用自周歷職匪父任清談激姦偷深衣見本色講卷追前修一旦謝事去恍若鷹脫韛側目盼雲衢取意東南逰孔孟日杲杲事業橫清秋祝爾博好官祝爾遂逺謀祖父有成規控弦視雙彄後漢伏湛傳器博者無近用道長者其功逺韛所以絆鷹也鮑明逺詩昔如韛上鷹今似檻中猿韛退之送侯參謀詩今君行得所勢若脫鷹彄弓弩專弦所居仙遊縣永興里聖泉昭靈廟有靈泉自穴出冬夏之交泉源不涸灌民田百餘頃鄉民賴之故老云有巨靈跡存于石為吾里竒觀豫以跋涉之勞不能遍觀也按趙耕張龍公碑諱路斯潁上百社村人夫人關州石氏唐時以明經為宣城令自宣城罷歸釣於焦氏臺隂生九子一日見釣處有宫殿遂入居之自是歸輒體寒面濕問其故曰我龍也蓼人鄭祥逺亦龍也與我爭居此明日當戰使九子助我我領絳綃鄭領青綃明日九子射青綃中之九子皆為龍子孫世居潁上龍公大唐英實出留侯裔棄官歸去來學道簮綰髻一朝戰潭穴青絳分兩斾妥靈眷兹土碑碣傳千􅑤作廟殿山阿至今驅祟癘仙源泌甘泉潏潏冬不閉坐石連尻脽苦身甘􅏓盩百畝每每田豐穰無旱嵗禾生滿東西隴畝草不剃瘟行遍鄉落不見其牛掣飽飫神之功安全神之惠神仙事渺茫且享春秋祭東方朔傳武帝問朔曰方今公孫丞相兒大夫董仲舒司馬遷之倫先生自視何與比哉朔曰臣觀其吐吻唇連尻脽臣雖不肖尚兼此數子也之賈誼疏天下之勢方病大􅂒一脛之大幾如腰一指大幾如股非徒腫也又苦􅏓盩謂足􅏓反戾不可行音炙戾水禮剃氏掌殺草月令季夏燒剃行利以殺草注芟草也讀陶公遣力與子助勞書略曰吾遣一力為汝薪水助此亦人子耳可善馭之吾求諸古人日力皆自給季子薪自負范妻爨自執豈曰乏其人勞役甘汲汲有形反纍人遺譴恐自及吾身非季子吾妻非范妻井臼必自操舉案常眉齊冬夏完葛裘朝夕調鹽虀嗷嗷八九口幸免饑寒啼衛青本人奴道固所生賤受命理則同世人無定見陶公遣力書惻怛豫所羡諄諄善馭之言鍛而語煉薄俗難具論請讀王褒券北史崔道固為宋諸王參軍被遣青州募人長史以下並詣道固道固諸兄等逼所生母致酒炙於客前道固驚起謂客曰家無人與老親自執劬勞諸客皆知其兄所作咸拜其母母謂道固曰我賤不足以報貴客汝宜答拜諸客皆歎美官衛青為平陽侯家僮曹夀有一相客相青曰貴人也至封侯青笑曰人奴之生得無笞罵足矣安得封侯資蜀王子泉從成都楊買夫時户下有髯奴名便了决萬五千與立券約從百役使書暇遊傅氏竹林辛未六月嵇阮得大名嵇康阮籍山濤向秀劉伶阮咸王戎是謂七賢清譽豈在竹邈哉千載下髙風竟誰續此君直而清竒致異凡木吾徒婉而真古淡超流俗天生不群人領此清閒福所以隨所寓徑造無不足書舍接平林嬋娟常在目時携一樽酒隂涼侑醁竹下成八賢松唯舜也獨莊子德充符受命於地唯松柏獨也在冬夏青青受命於天惟舜獨也正幸能正生以正衆生賦詩詩思清讀書書思樂清瘦愈濁肥好伴林間鶴癸酉六月十六日雷雨交作經日乃止農田甚為之害皇天司下民有赫冒于上四維列星宿環布嚴拱向赤子魚頭生噞喁食土壤九州隨土性播種無閒㽘天心憫下民艱食勞勸餉嘉生膏隂雨神功均圠坱嚴勑內外官班職俾分掌雨師十一來風伯五當往俾汝司噫缺汝獨矜神王揚砂振陵嶽怪差不可狀俾汝司肅狂汝獨誇雄壯傾河決堤堰怒氣誰敢傍上天有紀綱謫罰豈虛誑三台相北斗太白居大將熒惑執法官强禦所不讓具箋奏天門天顔為愴恍謂宜殱巨姦民瘼不可長神靈願悔禍自失甘懲創力耕有不獲太平本無象莊子大塊噫氣其名為風是唯無作作則萬竅號怒王充論衡太平之時五日一風十日一雨風不鳴條雨不破塊大聚氣為噫開口為缺仙人噫缺則為飄𤣥雨擢手則為雨法言耕不獲獵不饗𤣥獵乎唐宗延英對宰相曰卿等有意太平乎牛僧孺對曰太平無象今雖未及至治亦可謂之小康而求太平非臣等所及杜詩一夫臨關怒百萬未敢傍是客送酒復對客百年三萬日不可無此酒此酒不可無此客未嘗有種秫學陶公二頃五十畝欲使酒如坻薰蒸及蒲栁年來精力衰入戒亦已久長瓶閒卧沙鴟夷解車後君來暫破戒劇飲共濡首酒豈有過乎閉門防客走易未濟上九有孚于飲酒無咎濡其首象曰飲酒濡首亦不知節也左晉書桓溫請謝安為司馬安喜言平生竟日既出溫問右曰顧嘗見我有此客否夜坐觀星天如漆黑盤明星四散出大者絢珠璣小者布砂礫虛浮蔽太空氣焰光相射飛流伏匿間分據九州域吾將叩真宰汗漫無紀極大樞列北斗五星聚東壁匼匝司下人修悖見凶吉森然羅萬象甘石難測識箕張牛奮角想像雜塵臆天亦未必知蔑茫欲誰詰神堯敬授時司天髙百尺熟讀天文書大試保章職晉書齊有甘德魏有石申夫皆掌天文晉晉史董因云公子重耳以辰出參入以驪姫之難出當辰十九入晉當參以辰參出沒重耳象之終免其禍出入不相見擬古呈賀郡公喬林巢獨鶴自愛經幾秋戞然伸其喙衆鳥噤不啾饑啄玉山禾渴飲清渭流豈不念饑渴芳潔慎所求翹首仰雲衢亦有健翼逰雲衢非吾事所性林泉幽林泉有何樂雞䳱相與儔賊糧固其性耿介難自謀雞肥鶴日瘠謾自髙一頭况又去其半半載不見酬衆禽然笑餓死豫爾羞餓死則猶間未死將誰尤揚子學行頻頻之黨甚於􅢟斯亦賊夫糧食而已續聶夷中傷田家貿貿丘麥秀蠕蠕吳蠶生微行執懿筐亦既受厥明上焉給王賦下焉紓官征豈為饑寒念所念瘡痏平哀哀生理窄了了無餘贏惻怛夷中詩萬古田舍情龜洋僧越浦造寧海東際橋姪清甫為求詩以壯其事我昔擕二客涉此春江潯春江渺無際下有魚龍吟行客日已晚夾岸菰蒲隂滄江見舟子招招勞子心我家山之陽我友山之岑懷哉不得往黃鳥鳴空林向微塵外人慨此將焉任欲立萬嵗功豈憚嵗月深刺手劚巨鼇絫址重淵涔雲濤鼓韶濩共爾澆煩襟吾鄉鄒魯鄉人物多華簮寥寥䜟緯語桓談非所欽為謝金仙子氣化無古今逝將紀江漢相國生自南桓談不言符䜟云聖僧黃妙應䜟寧海通人行此時卿相生黃妙應莆産也相溪陳教授世英俊夫秩滿且有莆稅使之除古意問訊併以自述難難重難難遲暮事儒冠遺下兔園冊十年仍獨還獨還竟何如衣垢鬢髮斑憔悴何足惜龍蟠肆其蚖揚子問神龍蟠于泥蚖其肆矣蚖㦲蚖㦲烏覩龍之志也歟注蚖蜥蜴也似龍而無角如蛇而有足肆則區也言龍未飛天與蚖同區也我如幽澗泉屈曲走鬱盤君如大壑水蕩漾生波瀾澤物固已多涸鮒常枯乾寥寥管鮑交此道古所難新歸未稅駕史記李斯云當今大臣之位無居者於吾未知所稅駕者矣僕御遲音治促鞍展禽稱賢士不肯卑小官狗監不知薦主天子田獵馬曹固勿歎晉王徽之桓冲騎兵參軍使問卿署何曹徽之對曰似是馬曹國朝重錢榖許綴通明班張守真朝玉皇大殿覩其扁曰通明不曉其㫖因焚香告曰通明之義未諭敢祈真教真君曰上帝升金殿殿之光明照於帝身身之光明照於金殿光明通徹故為通明殿玉帝殿名也三命士所齒忠嘉忌尸餐寤寐心旌搖討裁筆舌殫韓退之雪後寄崔丞云殿前諸公賜食罷豈念幽桂遺榛菅文選心搖搖如懸旌揚子孰有書不由筆言不由舌吾見天常為帝之筆舌鸛避巢亭山有林木葉密枝柯樛昻然來鸛雀棲乳巢其幽旁枝鬱而聳噂沓衆鳥稠雛成過百口俯啄聲啾啾奈何遊食徒饞吻思炙謀朋曹議其下一日十舉頭曰謂不可攀出計桀石投破巢中要害十死九不留鸛雀作而駭逼我良有由逝將挾其雛擇棲于某丘拮据豈不悴且免傾覆憂不知汝下民尚有侮我不嗟嗟禽非人傷類固所羞云胡人異禽兄弟交相訧莊子長梧子曰汝亦太早計見卯而求時夜責司晨也見彈而思鶚炙曰左傳成公二年齊髙固入晉師桀石以投人徇于衆欲勇者賈豫餘勇食筍美甚為短句居不可無竹逸少傳蘇公此君有令子未脫褓襁中嶄然露頭角綽有乃父風時因侍盤盞談笑觀從容乃父缺嫵媚吾亦竒阿戎王徽之寓空宅便令種竹曰何可一日無此君坡詩寧可食無肉不可居無竹謂南史禇淵謂任時父遙曰聞君有令子相為善之所百不為多一不為少唐太宗曰我見魏徴少嫵媚耳籍阮籍素與王渾為友渾子戎年十五少籍二十嵗而與之交籍每過渾俄頃便去過視戎良久乃出謂渾曰濬冲清賞非卿倫也共卿言不如共阿戎談鷠鰂魚海族誠多竒覼縷未易識小童鬻市歸蒲穿不盈尺團團類瓜蓏混混無鱗脊癩足疑醉泥詰之曰鷠鰂烏賊俚語歟取義中竊墨群兒相晤言墨瀋於焉得初疑梁進士眊矂澆以汁又疑漢治書殘馥餘膏蹟毋乃近硯池餘波恣啖咋得非吞舟魚尚餌沈河璧自蔽本求全不知滅其跡喣水水盡烏竟以墨自賊子瞻謫海南作說為之述爾雅注蟲魚網漏缺詳悉栁渾與孟容書秉筆覼縷神志荒耗覼當作覼力和切名阿琦甲寅丙寅丙寅丁酉我之先君子琦也為大父大父闕丑揆初度我及阿翁齡見汝二十五乃祖行祕書萬卷相撑拄丁卯鄉貢郎姓字登天府乃父材智凡生不博今古不能讀父書涉世徒艱苦賴爾後來人勉旃踵前武行當伴從兄諷誦喧堂廡聖朝方右文達者可指取祝爾學茂良豈必由父祖祝爾誠諄諄從違誠在汝周禮地官鄉大夫三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫以禮禮賔之獻賢能之書于王王再拜受之登于天府揚子重黎甘羅之悟吕不韋張辟彊之覺平勃茂良乎曰才也茂良不必父祖無邉上人住靈巖滿月無邉領新命此日道場開月向滿時滿人從來處來論公推甲乙質美等瓊瑰喜入諸山筆聲同大地雷宜髙當路眼暫屈上乘材太白僧伽識非因兆介媒韓雨中寄孟幾道聨句念初相遭逢幸免因媒介讀涑水司馬公和金陵王半山烘蝨文人語多工徽纆自繩糾嚙蟲至么麼謂可懸户牖胡為大車軸貫心竟何有禦寇近道翁縱此瀾翻口景略疏放時王猛字景略袖此無用手掛名青史中遺笑傳不朽後世為美談姓字記誰某二公廊廟資力可扶宇宙如何酬唱間爬剔便絮垢仁義蝨其官有益國家不三歎商君書掩卷重搔首晉書王猛隱于華山懷佐世之志桓溫入關猛被褐而詣之面談當世之事捫蝨而言旁若無人溫察而異之官商君二十六篇以仁義禮樂為蝨官如日農曰商曰三者天下之常官也農闢地商致物官法民三官也生蝨者六曰嵗曰食曰玩曰貨曰志曰行六者有必削者也誕阿鼎戊辰庚申癸亥壬戌戊辰秋七月十日中元近亥戌當此時喜見二德並宣尼親抱送寶志摩其頂英賢久不生甚哉門户冷天意或其然書澤傳有永嘵嘵三男子琦鏞與阿鼎異日考作室已卜子堂肯翁無甔石儲氣量有萬頃聖賢不憂貧此意要訾省忠信為根株詩書作綱領此語書諸紳受用有不盡作詩示兒曹見者發一哂南史徐陵母臧氏夢五色雲化為鳳集左肩上已而誕陵數嵗家人携以候寶志志摩其頂曰天上石麒麟也揚子清靜寡欲家無甔石之儲晏如也子漢書膠西王子端遂為訾省謂無所省録訾音集韻云思也訾省猶言無所思省送黃仲復雷卿任三山學録後職教于莆泮漢廷購宛善馬肆空學校選入飛兔群一躍猶變豹近者八鄉逹往往皆職教去作他人姝炙轂轉髙妙臯比橫講席鶴俸供廪稍瞻視凡馬群尾大固不掉君為汗血駒銀鞍追騄驃淺飲合沙流時來即同調前漢大宛傳宛别邑七十餘城多善馬汗血言其先天馬子也汗從膞出故名汗血馬也孫卿子曰驊騮騏驥纎離騄耳古之良馬也易經君子豹變其文蔚也館所歸謁上官廣文先生富道德來作斯文主詵詵弟子行樂育均教雨宗師大範橅甄陶同其所施以陶物功器成無啙窳顧惟頑鈍資姓字忝廊廡奔走衣食途簞瓢屢空窶先生如春溫於物了無拒敬持一寸心逺托萬間宇初冬述懷十四韻戲簡周介福陳仲敷二先生顓頊方用事威節何辛酸百卉無遺秀千林變成丹隂風日凄厲梯此長恨端妖艷不可極豫生尚多艱寒爐守煤燼枯條滿青山乾釜憶瀺灂甘井生波瀾新霜骨髓痛永夜衾裯單病馬聞飢嘶露猿聽號寒起坐復㾕􅂒有酒難為歡愁如匪浣衣何時思一浣棄置兒女悲壯志生羽翰况當警寇盜戒備嚴鄉關願請受長纓殄彼為民殘天乎矜其能夕死意所安漢書南越與漢和親終軍年二十餘終軍請受長纓以羈南越王而致之闕下古意呈夏政齊權府夏侯富文術武庫森韜略文武出天資結髮習象勺問程已知津擕家猶土著客戍又二期翩翩載琴鶴猥誦病競吟自慚才鹵薄主將倘見收猶堪助橫槊漢書有結髮翰墨結髮而戰言自幼小時也槊南史曹操曹丕馬上橫槊通俗文曰矛丈六者名杜詩主將收才子崆峒足凱歌武梁武帝破魏㑹群臣華光殿聨句曹景宗後至帝以人不分韻曹不平啓求賦詩韻已盡惟病競二韻命與之援筆成曰去時兒女悲歸來笳鼓競借問行路人何如霍去病書莆邑長官伯罕德政詩卷後其子三載在豫席下後為金灘稅使歷縣猶歷灘少載灘自平牧民猶牧羊弭鞭羊自行轡如信陵執琴作單父鳴不曽讀古書禮樂森縱橫三年行播政文士交騰聲采采繼國風付與千載評莊子善養生者若牧羊視其後者而鞭之嘗記韓簡東野詩我願身為雲東野身為龍四方上下逐東野雖有離别無由逢然亦不過詩人相愛慕之情云耳貫齊大帥輿疾督捕客莆近兩閲月僕以老病相仍艱於出入是以㑹晤之時少情甚親而跡甚疏視古人以雲龍相期異矣敬賦以紀其事班生投筆歎志在萬户侯貫齊有道者體博用自周文武具天性逸氣隘九州四戰死無生不避劒與鉤豈不念膚體有類百衲裘陟岵哀所天抱痛終千秋祖父八袠餘坐膝恩未酬前年謝事去喜若鷹脫韝寄跡老子中黃冠卧林丘事有不可料焉能箸前籌霞城選名將揀擇云公優輿疾赴簡書竒疢行當瘳抵莆相物色無恙即㸃頭嗟豫十年舊阻隔知無由欲接平生歡引吭閉其喉别久坐移時十語不一酬殷勤叙契濶咄咄書不休忠孝茍無愆丈夫夫何憂滫瀡奉餘年天必應所求老老能及人然不豈然不後漢班超字仲升歎曰大丈夫無他志略猶當效傳介子張騫立功異域以取封侯安能久事筆硯間乎恙張良傳臣請借前箸籌之李陵曰霍與上官得無乎黜晉殷浩為桓溫所奏廢為庶人殷浩雖被放口無怨言但終日書空作咄咄怪事而已莆田之新安田君晉叔擕二季逰桐城有年今挈而歸里於僕初無平生之歡一日以其道同一語輒合知其為吾黨中人也暇日示僕教子積分圖豫嘉其刻志自苦又樂顗頊有賢父兄異日將有成也聊書四十韻以道鄙意云爾吾聞古聖人不厭與不倦自下仁智工結此兩重案學焉不時習所學與氷炭傳之而既習在已已可玩又聞嘗獨立子不教而逺詩禮叩其端必待自貫串他日面牆誨正恐無所見知困後教之孔氏說命疏一語發關鍵譬如立田苗守塊逢久旱隂雨一膏之欣然滋溉灌豫亦村校書挾冊入渠觀陶成鎔中金躍冶不復鍛在寢皆淵騫幾見籍湜叛召閙四十年正在為師患田君善教子衡石自程限家有積分圖蓄眼未嘗見精勤朱暈圓荒嬉墨塗半日居而月諸於焉考最殿象教業黑白佛經善業為白惡業為黑善惡工變幻吾徒有正學勿為它所變二氏相為用韓語此語亦欺謾後世雜機權演孔老佛亂有道往正之又恐識真贋麛駒氣食牛早覺牙爪換異日瑚璉資濯濯出圭瓚雖云賴琢成已與燕石判専門翁季學平居相講貫三程與三蘇淵源何汗漫至哉有此樂鼎立期璀璨名世紹弓箕安弦必操縵元亮達道翁詩酒了昏旦命子責子篇喟焉興永歎退之唐文人示兒語粗悍玉帶懸金魚銀車遭謗訕所貴孟母賢斷機示懲勸名垂千載下嵩華走河漢汝南月旦評靖紹許同傳示我贈送篇粲粲錦繡段豫非能文者才短如襪線犧樽眩青黃回首溝中斷李昭字台瑕言韓八座事業如拆襪線無一條長者八座名昭梅峯僧一理徹菴其號也住靈巖上坐開堂演法歌以贈之太白識僧伽退之識澄觀理也釋門老融徹道一貫西教窮根源剞􅩻精把玩開迷疏鈔箋輕重分鐵炭禪和得龍象𤣥義慧傳粲六衆不聽瑩了了送一難大珠既脫翳白月亦磨漢云胡法又别心佛自變幻擺手住此山蒼松回碧幹梵香海潮音御爐雲影散山林願太平上祝堯舜萬余郡守核實賔序莆為士鄧林僕也樗散木不遇匠石知終焉卧空谷盛年汝南評誤蒙君子録爼豆於賢人青黃眩群目晚綴耆舊班久厭文離粟燕石誠混淆烏覩荆山玉士窮舍學校挈挈焉歸宿處置或異宜何異推舟陸自慚過稀年薦剡至纍幅枯朽不自量吹噓勞尺牘皇天惠仁侯文翁親化蜀善類盡薰陶淳風振頽俗竊喜遇荊州志願平生足長價王侯門青萍從結緑和復齊憲副初春遊園韻為愛名公詩性情清且和慮淡物自輕意愜情已多嗅花憂世事實負居甲科豈無治安䇿少答喜起歌回首謝蒼生時兮將奈何續軒渠集卷二
