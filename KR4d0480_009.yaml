body:
  text: 續軒渠集卷九元洪希文撰詞調八聲甘州憲司循行召試秋光如此摧落堪嗟菊頴正新黃對逺山如畫殘霞似縷淡淡煙光怪得數聲喜鵲好語繞山墻報道皇華使載酒登岡回望碧雲深處凜繡衣霄漢玊斧光鋩况幕中二客辣手試風霜看醉醺龍蛇走筆借時人膾炙齒牙香儂才薄如何七步急就成章漢武帝遣直指使者暴勝之等衣繡衣持斧分部逐捕盜賊威鎮州郡漢雋不疑傳出漢元帝時黃門令史遊作急就章散𨽻體粗書云書斷臨江仙署劇擕酒就溪流盥潄因少憩松隂欲借明光無問處野懷雅趣林丘不妨枕漱事遲留千巖如競秀萬壑欲爭流月觀風臺隨處好頓令熱惱全收一觴一咏足清逰世情看白髮心事付沙鷗漢武帝太初四年起明光殿近桂宫成都侯商病欲避暑從上借明光宫華嚴經云以白旃檀塗身能除一切熱惱而得清涼也揚州有月觀風臺何遜梅花詩枝橫却月觀花繞凌風臺應知早飄落故逐上春來晉孫子荆曰所以枕流欲洗其耳所以漱石欲洗其齒或問顧愷之會稽山水之狀曰千巖競秀萬壑爭流阮郎歸焙茶養茶火候不須忙溫溫深蓋藏不寒不暖要如常酒醒聞蒻香除冷濕喣春陽茶家方法良斯言所可得而詳前頭道路長海棠春剖瓜青門瓜地連芳草富貴不來年少老雨露不曾偏顔色天然好揭來就把并刀破粟樣生金圓顆顆細味杜陵詩慰我懷枯稿前漢邵平故秦東陵侯秦破布衣種瓜長安城東瓜美謂東陵瓜杜瓜詩滿眼顔色好浣溪沙試茶獨坐書齋日正中平生三昧試茶功起看水火自爭雄韓石鼎勢挾怒濤翻急雪韻勝甘露透香風晚涼月色照青松清平樂風車風隨車走喚做天公不試運州黎高下手砂礫秕粳前後誰言天籟難移即今神柄誰持若問紅爐點雪從來理欲分岐鵲橋仙水碓山容疊翠水光拖練澎湃奔騰逺勢輸他心匠動機舂應笑殺伯鸞左計引渠激水連房鑿臼搗盡粳和秕朝朝暮暮不曾間又豈問豐年歉歲傳曰杵臼之智不及機舂桃源憶故人砭頑西風搖落梧桐井氣入韓堂凄冷百鍊江心銅鏡照盡鸞孤影利錐早脫囊中頴躍冶怎逃頑礦獨抱素心誰省漏甕勞修綆青門引棊白日沉沉永棋局間尋清興兩賢既不為山河強分南北黑白交成陳雌雄未決誰能省勢若曹劉競英雄到底誰是勸君動也何如靜品令試茶旋碾龍團試要著盞無留膩矞雲獻瑞雲二色曰矞亦瑞雲也乳花鬬巧松風飄沸為致中情多謝故人千里泉香品異逈休把尋常比啜過惟有自知不帶人間火氣心許云誰太尉黨家有妓鷓鴣天漁父萬頃玻璃浩蕩秋桃花小岸蓼花洲春風秋月等間度雨笠煙簔得自由移桂棹下綸鈎功名利祿不須求得魚換了茅柴訖船放長江自在流如夢令櫻桃四月朱櫻乍熟甘露一般清味禽觜奪將來卸在赤牙盤裏何似何似清淨摩尼珠子踏莎行雪中山茶風掠寒條雪封凍蕊行人蟻凍荒崖裏千巖萬壑白皚皚孤紅傑出真堪美生類殱夷芳心銷歇玄冥漏泄春生意衝寒折得一枝來徐熙畫底應難比沁園春壽東泉郡公農樂豐年擊壤西東千倉腐紅正火劑漫山丹青炫轉朱華冒水雲錦繽紛鍾秀燕山分符壺嶠鬱鬱蔥蔥初度辰人爭道是卿雲甘露育瑞儲精公餘玊麈綸巾逺賽過唐賢幾輩行看筆軍掃陳羊欣給役詩工綴錦王翰求鄰咀嚼羣經搜羅百史辦下工夫日日新東泉水願永霑學海混混涯津漢文帝紀初為郡守為銅虎符竹使符剖竹分符各留其半右當留京左以與之囷史記天官書若煙非煙若雲非雲郁郁紛紛蕭瑟輪是謂卿雲卿音慶綸音菅水龍吟壽夏政齋閏八月初二一年兩度中秋這回初度尤堪喜蓂生二葉荷開十丈荔丹千里令肅貔貅業安畎畝戍安隍壘况莆民截鐙帥垣攽檄人歡恱雷聲起自古將門出將貴三品腰金綬紫它年領取英公官職黃公年紀綵袖翩翩慈幃強健諸孫環侍侍婆婆酒醺呵笑花下含飴要戲夏英公名竦浣溪沙雪夜病起入室天然惱病禪打窗風雨悶吟仙歸心一點落燈前猶有十三樓上酒可無三百杖頭錢一年心老一年年栁梢青春恨問訊梨花不知還解更幾番風雨打黃昏泥香白雪愁與誰同可堪鳳懶鶯慵飛不到蕭娘鏡中望斷碧山恨迷芳草春太匆匆玊樓春重書靈岩舊題處燕語垂楊春又暮往事空隨流水去當時傑句倩誰題塵壁只今無著處酒債尋常隨所寓煙竹風花堪笑語偷間將學少年逰終不似邯鄲故步孫權叔孫濟嗜酒不治産常醉屢欠人酒緡人笑之濟恬然自若謂人曰尋常行坐處欠人酒債欲貨此緼袍償之古詩典盡春衣無可奈尋常行坐欠人錢水龍吟代洋尾李氏壽柯竹圃降庭佳氣蔥蔥輝聨南極光如晝門弧紀瑞華筵開宴兜離仙奏梨棗功深汞鉛訣祕內丹初就咽壺中日月放懷詩酒這安樂窩中叟夢語喧傳萬口况雞林有人親售當家句律早傳驥子孫枝又秀自愧長文逺離車膝幾時回首料得今朝歡笑大家拜舞外翁千壽許穆入華陽洞得道王母第二十女紫薇夫人與穆書曰玊醴金漿交梨火棗飛騰藥也不比金丹已生於君心中以君心猶荆棘相雜是以二樹不生不見身中鉛汞氣力汞精血道家以鼎烹金石為外丹吐故納新為內丹柯能黃白術故云白樂天詩集雞林行賈售其國相篇易一金偽者相能辨之世説陳太丘詣荀朗陵無僕使元方將車季方持杖長文尚少載著車中既至荀使叔慈譍門慈明行酒六龍下食文若尚少坐著膝前齊天樂壽方君會山隂文會才三日懷陳迹都如掃鬱鬱蔥蔥融融溢溢和氣偏薰瑶草春光未老便撒放鶯花收回梨棗醉咽霞漿壽峰側畔神仙島牆屏翩翩學子總芝蘭玊樹映人娟好德耀新歸子平畢娶來歲掌珠可抱名韁利鎖任祿食千鍾位登八座貴不如間與兒郎自效其子後納粟本路經厯滿庭芳送張譯史東州秩滿歸代方譯史作卓卓聲名英英人物翠壺肯暫遨逰與君聚散鴻燕自春秋位置六曹上客揮灑處文彩風流蓴鱸好故鄉入夢留不住東州驊騮從此去嘶鳴北向志氣悠悠指燕臺路近唾手公侯料想春風得意醉眠韋杜最高樓天付與男兒事業姓字覆金甌京兆城南有韋曲杜曲杜正倫為相與城南諸杜昭穆逺求同譜不許御之諸杜所居號杜固世傳其地有旺氣故世衣冠正倫建言鑿杜固通水以利人既鑿川流如血自是城南諸杜不振雞距集韋曲杜鄠近存長安諺云城南韋杜去天尺五杜詩文彩風流今尚賀新郎壽李西隱時館於李氏今日知何日聽瑶池西來青鳥密傳消息阿母臨行宣曼倩留取蟠桃休喫因則甚鸞驂未出約待西方無量壽賀西家大隱開華席蓬萊島神仙客壺公滿眼春光溢正千花萬草薰人芳菲紅碧快意長江都是酒放出韓湘竒術况兩鬢蒼蒼如漆記得晉公留好語二三百歲有何難劃耐松柏堅金石王母以玉盤盛桃七顆以四與武帝帝欲種之母曰此桃三千年一實帝乃止倦尋芳春詞卧鴨爐邉翔鴛屏底正斷腸處煙草風花粧點春愁無數貪睡海棠酣暈臉欹眠楊栁狂飛絮倚東風子規呌月亂鶯啼樹儘逰賞吞花卧酒握月擔風誰訴離緒鏡裏朱顔還被青春領去簌簌紅飛愁萬點絲絲緑織愁千縷這光隂那堪幾番風雨念奴嬌冬月月華似水正同雲天氣流光如爍泠氣射人寒㾕􅂒走下深簾重幕十二瓊樓三千玊斧手凍慿誰斸乘鸞女子為伊再三驚愕回顧玊露凄清恐非人世怎敢輕諧謔上界神仙官府足肝膽驟然傾落凍合關河光搖牛斗飛起橫江鶴平明起視雪封枝上梅蕚滿江紅幽居築室雲屏連翠巘斷崖如臼任紅塵飛到借風為帚談笑從容無俗客山花風竹皆吾友做姬公事業竟明農終田畝間乂却經綸手緊閉了謀謨口看高車公相塞途僕走是有命焉那幸致萬鍾於我夫何有但卿車我笠勿相忘須回首踏莎行觀堂試郡國興賢􅓺宫課試書生事業從今始銓衡當道有司明吹噓送上青雲裏賦要凌雲文如翻水八音五色驚童稚時人莫作等間看丹墀獨對應如是酹江月酒邉一年佳景又新橙快意重呼醽醁爭奈情人乖信約誤聽幾畨風竹魚沉鴈杳懶聽相思曲少年狂夢黃粱早已先熟烈士壯心仍在唾壺敲碎此恨何時足太息舊交風雨散大半已歸鬼籙對酒凄涼欲誰訴喚起蒼虬玊槌床大呌為豫更剪明燭洞仙歌早梅野亭驛路盡是尋幽客水曲山隈浩無極見松荒菊老歲晏江空搖落盡幾點南枝消息天寒雲淡月弄黃昏色綽約真仙貌姑射占得百花頭上積雪層氷捱不去只恁地皚皚白問廣平心事竟何如縱鐵石肝腸也難賦得風中栁水碓錦里人家桑柘隂連西崦駛決溪流青似染引機激水作碓依山旁無朝無暮無豐歉德耀當年杵臼生涯勤儉強勸郎溫溫笑臉男兒志氣正欲長光焰任頑石也須頭點如夢令燈花報道燈花如晝燁燁文章摛繡安頓莫風搖應恐夜寒花瘦搔首搔首結褁望天將就桃源憶故人别故人客亭折盡垂楊栁馬箠堤邊無有唱徹陽關杯酒别我平生友男兒得意須回首烏兔東飛西走臨發不堪分手戀戀君知否蝶戀花蠟梅雪裏江梅標致好千古詩人總被橫斜惱蠟貌梔言愁殺我道伊曾向孤山過檢點花房開幾朵錯引出蜂釀蜜供殘課三嘆楚騷無可考梅花已不如芳草水調歌頭雪梅崖谷搖落盡銀海眩花生霏霏漾漾閉門三日斷人行我欲尋幽無路但見砌平凹凸粲粲盡堆瓊片片勻如剪散入馬蹄輕梅索笑竹含貞酒頻傾矜香鬭色鼻寒無孔眼瞪瞪昔則寒林水墨今則瑶臺琪樹竒妙孰能名起舞歌白雪聊暢我幽情續軒渠集卷九
