body:
  text: 續軒渠集卷三元洪希文撰七言古風題聖墩妃宫湄洲嶼我昔纜舟謁江干曽覿帝子瓊華顔雲濤激射雷電洶殿閣硉兀魚龍間此洲仙島誰所構面勢軒豁規層瀾壺山峙秀倒影入梁元帝纂要云景在上曰反景景在下曰倒影司馬大人賦貫列缺之倒景兮涉豐隆之滂濞張晏注曰景去地四千里其景皆倒在下也乾坤擺脫呈倪端韓退之南海神廟碑乾端坤倪軒豁呈露粉牆丹桂輝掩映華表聳突過飛巒湘君小水幻露骨虞帝跡逺何由攀湘君堯之二女舜之二妃舜南巡死扵蒼梧二妃從之溺死沅湘間銀樓玉閣足官府忠孝許入巫咸班帝憐遐陬雜鯨鰐柄授水府司人寰五雲殿邃嚴侍衞仙衣法駕朝天闗危檣出火海浪破神鬼役使忘險艱靈旗毿㲚廣樂振長風萬里翔孔鸞平洲逺嶼天所劃古廟不獨誇黄灣黄陵有湘君廟至人何心戀桑梓如水在地行曲盤升階再拜薦脯藻不以菲薄羞儒酸日談書史得少暇石橋潛渡凭雕欄詩成不覺肝膽醒松檜蓊薈鳴玦環騎鯨散髪出長嘯追逐縹𣺌乗風還阮籍甞於蘇門山遇孫登與商畧終古及棲神導氣之術登皆不應因長嘯而退至半嶺有聲若鸞鳳之音響扵巖谷乃登之嘯也韓詩翩然下大荒散髪騎麒麟題王昭君出嫁圖平生慣讀明妃怨老来却向圖中見看詩只見古人心看畫又知古人面當時初選入漢宫亭亭秋水環芙蓉芙蓉照水矜顔色自信年少長春風一朝引見辭君去此心已作楊花絮黄河一去不回頭泣損花容留不住輜車重載漢寳歸驪黄嚼嚙黄金羈媵臣尚作首䑕熊居延萬里行遲遲居延漸近漢漸逺胡使悲歌落日晚人生失意何足云螓首蛾眉難自遣琵琶韻絶心悠悠氊廬未到眉先愁氊廬愁愁幾種胡恩終薄君恩重哈敦般鐸春草生尚有行人弔青塜漢田蚡怒韓安國曰何為首䑕兩端首䑕一前一却哈敦般鐸乃國朝語也乃青塜之所在或云哈敦娘子也般鐸墓也理或然也哈音渇鐸音卓月軒施老人求山丹栽老施學道嚥紫霞丹成仙去餘此花尚餘仙子傳丹穴青睛紺髪顔如霞當時郭陳兩詩老郭梅西隚長樂人陳鐵坡天驥莆田人曽對此花被花惱至今素壁照夜光可惜花仙不知寳晚年同好洪崖翁仙根吹送煩天風花開爛熳𤣥圃紅爐中九轉難為工史記貨殖傳巴寡婦清其身得丹穴而擅其利數世𤣥圃亦名閬苑在崑崙中效蘇子瞻莫笑銀杯小勸君莫笑銀杯小一日傾瀉三百杯勸君莫笑一日飲百年三萬六千回吟時只作簡簡吟白樂天簡簡吟不肯迷頭藏白地斟時只作淺淺斟下筆直作風雨快醉鄉酒徳逢知音我無公田二頃半床頭幸有琴堪玩陶公曠達未足云嗜酒何如飽喫飯須信小小亦自竒老盡英雄君豈知揮金留客固自好争柰無金愁殺我前漢疎廣傳歸田里日請故舊賔客相與娛樂數問其家金尚有幾斤輒賣以供具錢盧仝詩天下薄夫苦躭酒玉川先生也耽酒薄夫有恣長樂先生無錢養澹泊有錢無錢俱可憐百年聚過如流川陶詩雖無揮金樂濁酒聊可持淵明甞蓄素琴一張徽絃不具甞執而和之日但得琴中趣何勞絃上聲書夏政齋欠伸背面美人圖䰀鬌髙髻宫様粧天風飄飄雲錦裳陌上桑頭上䰀鬌髻韋蘇州䰀鬌髙䯻宫樣粧心華未肯開桃李縱有粉黛難輝光怪渠何事長背面百嵗風花能幾見雲収雨散易傷神齊魯姬姜顔色變當時畫史筆亦神風流醖藉作欠伸丹青意在毫素外縦使貌得非天人可憐前代汗青史薄命佳人類如此幾多寵極愛歇時失意長門暗宫裏老人耳冷不欲聞世上兒子徒繽紛摩挲喜見法眼浄為君起炷爐中熏唐宣宗日朕耳冷不知有卿也背維摩詰經云逺離塵垢得法眼浄周昉畫面欠伸内人極精文與可墨君與可名同梓州鹽亭縣安泰人皇祐元年馮京榜及第王子猷寄居空宅中便令種竹或問其故但笑指竹曰何可一日無此君此子猷命竹為君也與可善墨竹東坡先生呼竹為墨君作墨君堂記竹中三昧稱老可半幅鵞溪東絹好鵞溪在梓州鹽亭縣出善絹杜詩我有一疋好東絹蕭疎逺近自成林露葉風枝皆帖妥客来披卷當晴牕毛髪盡豎心旌降觀其妙處不外得筆力到處今誰雙當時揮洒不自愛持素踵門了無礙流傳好事直至今文采風流遺墨在細哦公詩展畫看詩如有韻青琅玕詩在床頭畫在軸髙堂誰作秋聲寒古硯床頭宂石鈍如椎淬我毛頴利如錐書成四體工㸃􅚭山谷張文潛贈君洮州渌石含風漪能淬筆峯利如錐聨珠照几光陸離朝来浄洗看墨色堅緻瑩滑如琉璃乃知鈍静固得夀上接道脉同耆頥我生無田聊食汝簞瓢仰給猶山雌却怪老桑未達道守藝改鑄何其癡桑維翰或令其改姓維翰鑄鐵硯以示人日硯穿則改姓卒以進士及第硯乎硯乎汝尚未穿我未老但願與汝終始無磷緇揚子山雌之肥其意得乎珠晉衛恒四體書勢成􅣺黠㸃􅚭連不絶惜春吟去年醉倒百花傍旁人拍手笑我狂韓退之紅芍藥歌云花前醉倒歌者誰楚狂小人韓退之今年花酒兩無分一春正坐讎書忙先生讎書未肯出詠栁題花閑度日朝来着步花已空搔首東風長太息飯牛歌牛吒吒讀如丘壑之壑蹏趵趵音博枯萁嚙盡芳草緑自晡薄夜不滿腹擷菜作糜荳作粥飼飢飲渇兩已足脫紖解銜就茅屋不愁飢腸雷轆轆風簷獨抱牛衣宿前漢王章字仲卿甞疾病無被卧牛衣中與妻訣泣涕其妻呵怒之曰仲卿京師尊貴在朝廷人誰踰仲卿者今疾病困阨不自激昻乃反泣涕何鄙也後章在官歴位及為京兆欲上封事妻止之曰獨不念牛衣中泣乎章黙然乃止云云丁男長大牛有犢明年添種南山曲杜詩為農山澗曲山阿曰曲煑土茶歌龜山石梯蠏井各有土産龜山味香而淡石梯味清而微苦論茶自古稱壑源品水無出中􅍽泉莆中苦茶出土産閩鄉音以茶為荼盖有荼苦之義其詳已見韓退之詩注鄉味自汲井水煎器新火活清味永且從平地休登仙王侯第宅鬬絶品揣分不到山翁前臨風一啜心自省此意莫與他人傳陸羽字鴻漸善煎茶次第水品以揚子江中􅍽為第一常州無錫縣恵山泉為第二揚州竹西寺上有井其水味如蜀江故其山號為蜀岡東坡甞扵此取水號為鄉味燄李約嗜茶曰茶須緩火炙活火煎活火謂炭之有者湘簟南州六月正炎赫徃来道路無行迹土山金石火雲焦珍簟琉璃秋水碧凛如凌室開寒氷暢若葛天逰化日安得清涼均四方蘇息蒼生九萬億聞禽哢五月七日穀雨晴南山北山布榖聲山禽何事强聒噪領闕畊種難為情吾家小兒懶且惰不肯出聲長黙坐資身衣鉢豈復知嵗月兒童容易過我老欲畊柰無田學作山禽司勸課祝兒書田早早畊得粟千鍾當念我課兒夜讀我生去聖亦已逺獨抱遺經増愧歎甞聞不食終夜思又道得之常待旦聖賢夕惕不遑安况我愚人甘事半便當折鏑不辭勞何至臨淵空久羡呼燈繼晷便焚膏似鳥黏黐守空案諷以萬言加百遍精力已疲道未見聴琴歌疎簾曲檻蘋風涼細腰美人藕絲裳神閒意定丰度逺玉指纎纎彈履霜喬林鶯囀日卓午幽澗泉鳴夜未央孤鸞别鶴生暗恨毋以氷炭置我腸梅峯大衆舉留東溟講師二十韻得法扵大都普慶寺梅峯古刹三百年今日教寺昔日禪閻浮勝境都占盡城市有此真林泉中朝崇佛廣說教遴選橅範来幽燕幽燕得法說宗㫖曇華種子皆鮮妍相州京邑飛鳥外出家學佛道理綿北溪雲峯僧龍象擇師教子恩義全司徒天下僧領袖卑辭厚幣何惓惓居然體製古罍洗一唱三歎朱絲絃旛幢排拶迎登席組結龜判華鑣聨吾徒跽受惕齋慄辭慳義卓無留𤣥宣明大訓說聖諦金舂玉應轟喧闐宗風承唱自家曲勇張赤幟光青氊一朝忽動慈幃念臯比撤去辭還山嘵嘵各是尊師者相率控告攀轍轅郡公處置採衆論歡聲雷動徧海堧同寅叶議彚薦剡狂瀾一障回百川星忙府帖下敦請障疏辭語清且圓從来佛性無南北隨縁付分何拘牽青蓮尚有堪修宇貝葉重有可註箋法縁未斷且駐脚事業儘有無窮年維摩詰壁如龍象所蹴蹋者非驢所堪佛書謂有力可以負荷者也傳燈録風宂延昭禪師有盧陂長老問曰師唱誰家曲宗風嗣阿誰書東溟講師赴囊山主縁障子海月堂前邈雲漢辟支巖下山石爛禪宫銷歇幾百年坐閱星移看物換溟師大是倜儻人法心無住無畔岸語言灑灑中邉蜜五色明珠光璀璨天親百法幾萬言毗盧大藏幾千卷前身畢竟遊珠宫科疏從頭盡淹貫龍天親自選棟樑囑付擔當詶大願凌雲氣節何飄飄架五鳳樓真手段幾多猿鳥下山来竚看山門回舊觀吾徒啟沃固已多浡若槁苗逢溉灌留公恐是予識偏久假不歸似欺謾闕溪祖師住此山中留衣鉢傳慧粲至今芳躅尚繼徃宿昔法縁未應斷前臺花發照後臺蚤為青蓮了輪奐賸將金碧飾翬飛留與後人作公案翩然返斾賦歸来勤為君王祝遐算偪側行代某人呈某官世途偪側多險惡趙本酒厚反為薄世途􅞏漓變朴淳魯鼎已贗能惑真臯陶世逺誰聴直盡道曽參能殺人哀哉直道喪已久不但州黎髙下手此心茍不愧彼蒼詎謂九衢異太行時非衆口金可鑠天定勝人元不錯揚子人衆固能勝天天定亦能勝人敗栁子厚愚溪對吾盪而趨不知太行之異乎九衢以吾車淮南子云楚會諸侯魯趙俱獻酒酒吏怒趙乃以魯薄酒易趙厚酒奏之楚王以趙酒薄故圍邯鄲趙地史記甘茂傳魯人有與曽參同姓名者殺人人告其母曰曽參殺人其母自若也及三人告之投杼下機踰牆而走是謂以愛惑聰癸酉六月十四日臂痛不自聊戲作短句卿不見將軍力挽十石弓勇沒矢筈寒氣隆又不見翰林醉揮數寸管勑賜宫袍天色晚古人文武具全材但見伎倆忘形骸君看朱亥椎晉鄙袖千鈞鐵何偉哉詩翁不復作是夢磨墨研丹足吾用晴牕卷手不停披塗竄典謨箋雅頌天公何事不見憐坐失肩背生憂煎頑然自覺不屬體縱有杯杓令誰傳諸君莫笑老無力他日為郎能執㦸漢武帝輦過郎署見顔駟龎眉皓髪曰叟何時為郎何其老答曰臣文帝為郎文帝好文而臣好武至景帝好美而臣貌醜陛下即位好少而臣已老是以三世不遇而老於郎署上感其言以為會稽都尉漢郎官殿下皆執㦸春寒無炭古人坐客寒無氊我今為客寒無煙東風兼領𤣥㝠權今年春寒過去年梅子含酸實未堅薺菜雖茂胎未全海棠羞澁開紫綿山南山北無杜鵑詩翁縮頸聳兩肩𤣥龜守殻凍不前吟成呵硯氷尚堅毛頴蹇澁非張顛喚起石鼎句再聨倚牆道士鼻息喧此時得酒真解仙博取一醉真可憐君不見雲安斗水直萬錢杜陵雖老性命懸畫灰對雪思悄然忍寒披絮夜不眠牛頭何日雙錦纒白樂天詩對雪畫寒灰殘燈明復滅炭賣炭翁半疋紅紗一文綾繫向牛頭充直木𤓰宣州土産花木𤓰藥鐺茗椀相傳誇游洋斗邑最窮僻園丘徃徃多靈植側聞饞吏口流涎就花計實尤可憐皂衣出入迭旁午主者為客客為主年年見樹不見𤓰饞吏採實主採花世情有投皆望報足見詩人言語到夏白紵白紵歌白紵舞並吳人之歌舞也吳地出紵故興其所見以寓意始作之田野後乃太樂氏用焉其音入清商調故清商調七曲有子夜者即白紵也在吳歌則為白紵在雅歌者則為子夜曲也水晶宫白銀闕鬢如青雲眼如月白紵為袍巾勝雪思君起舞清歌發秋風落木鴈南飛太息逰子何當歸桐絲指下音調稀雙雙玉淚彈珠璣任昉述異記闔閭造水晶宫海中三神山以白銀為宫闕色宋書樂志有白紵舞樂府解題譽白紵曰質如輕雲如銀製以為袍餘作巾袍以充體巾拂塵食蕈子蕈音椹俗謂之菰大火西流十日雨洗盡荒崖一番暑韭苗菜甲黄且腐大息辛勤業為圃城中不下十萬户食舎旁連啖葵茹深山􅌲蕈紛貢數山澤相逢盡筐筥兒童歸来恣烹煑脆於熊掌肥於羜先生飽飯腹可鼓文字何由會撑拄但令樽前筯可舉莫望蒸豚用人乳分渠宰相食萬錢飯有蕈羹多謝天晉王濟字武子帝甞幸其家供饌甚豐悉貯琉璃器中蒸豚美帝問其故答曰以人乳蒸之帝色為之不平食未竟而去何曽性太奢侈一食萬錢猶云無可下筯處七言長短句古風壺山老人說劒歌忠為質仁為衛淬其鋒磨其礪浩然之氣充天地水斷蛟陸剸犀運成風切成泥利哉之用無東西卿不見劉季起闗中項王宴鴻門荆客喋秦廷楚子静國棼彼皆庶人劍殺戮不足云又不見指髪成隂陽氣焰干牛斗卧匣如龍吟繞灘作蛇走彼皆𤣥士劒迂誕吾不售噫嘻哉夫我則不然衆人未易識簡而成其文粹乎見于色不報以為强順理以為直化愚以為智䂓圓以為方化鈍以為利直與鋒争鋩濯濯江漢清皜皜秋陽光孔子云用之則行舎之則藏廣異記載唐開元末武勝之知静江軍忽然灘中見雷公踐㣲雲逐小黄蛇盤繞灘上静江之夫以石投之中蛇鏘然有聲雷公飛去使人徃視之得一銅劍有文曰許旌陽斬蛟第三劍云聴琵琶齠年慣讀琵琶行昔聞今日琵琶聲初如登木雄雉聲嚶嚶又如伏櫪老驥蕭蕭鳴移宫換徴凄且清大遲小促和而平宣洩伊鬱陶性情不作兒女恩怨生君不見昭君去國萬里程豐肌靚麗漢主驚欲留不得信已成嗚呼韓邪得之不失為傾城管子地負篇聴徴如負猪豕覺而駭聴羽如鳴馬在野聴宫如牛鳴中聼商如離羣羊聴角如雉登木以鳴音疾以清古詩一笑傾人城再笑傾人國簡龜山雄峯老禪去年因讀方牧一紙詩常怪枯槁着句乃有如此竒陶飲酒詩顔淵稱為仁長飢至于老雖留身後名一生亦枯槁今年我亦為詩有此語若教牧見亦當有如我所譏結髪初入翰墨塲自謂不作吳下兒惜哉兩窮晚相值恨不早插兩翅相與逰天陲汝南一時評各能守家規屠龍豈失䇿至老論益彌朱汗漫學屠龍扵支離益三年技成而無所用其巧曳裾王侯門揮灑蒙厚知孤芳衆排屏百色工瑕疵儒庠雖設官徃徃多竊尸立言假仁義遇事生瘡痍合席推骨鯁同袍背韋脂惟此兩生者未易烏雄雌方生不言禄糠秕弗及之洪生雖干禄囊粟失所施東方朔有言侏儒長三尺餘奉米一囊臣朔長九尺亦奉粟一囊去年雷澤地方今安笟箄溪寒果得魚杯羹諒分遺惟兹方外老耐久敬不衰江空嵗云晚尚寄沽酒貲儒釋事一家縁覺無兩岐願作如是觀當如合分支韓送崔二十六立之云去来伊洛上相待安笟箄註取魚器續軒渠集卷三
