body:
  text: 續軒渠集卷六元洪希文撰七言律詩下過寧海祖居奉題屋壁示清甫姪聚族有百餘家水有源流木有根三洪餘慶幸滋繁兩家譜系同三世百載衣冠萃一門食舊豈能忘祖徳班固西都賦食舊徳之名氏食舊徳岀易擊鮮初不為盤飱漢陸賈謂其子曰數擊鮮母久溷汝也注鮮新殺之肉留題屋壁非無意要示兒孫手澤存傳記宋宰相三洪乃洪遵洪邁洪适父洪皓北使寄所懐曲阜孔世良淳五十三世孫迺祖孔元敬為莆經歴表忠卿淳師予先人幾欲編詩寄所思離懐病思未能竒愁雲長隔春天樹好雨獨来秋夜池佇立支羸扶楖栗相思排懣指鴟夷揚雄酒箴鴟夷滑稽腹如大壺終日盛酒人復借酤問天留取千尋綆深汲終須慰渇飢盧仝詩轆轤無繩井百尺渇心歸去生塵埃賣癡獃嵗尾年頭一局棊欲抛鈍滯竟安施不龜有藥乖時好自薦無媒莫我知非敢衒人為佞也必求賢士亦沽之送窮乞巧皆名世叫賣癡獃未算癡莊子宋人有善為不龜手之藥者世以絣澼絖為事客聞之請買其方百金與越人水戰大敗越人吳王裂地而封之龜音皸音義同韓有送窮文栁有乞巧文腰背困倦累月四月十六夜對月需酒獨酌杯杓逮明頗有竒効偶成一首獨居孤憤意難忘對酒當歌且慨慷入髓無聲非浪語到臍有効勝竒方暮年壯志豪猶在異縣他鄉氣不常半睡半醒天欲曙盎然肢體暖如湯韓非子有孤憤說難等篇言孤獨而憤悶也睡鳬並睡雙鳬立水湄獨拳鼎足自撑枝恬如李愬雪池夜牢似陳摶雲岫時坦坦情知無畢弋欣欣物各有雄雌猥香倚玉甘同夢詩甘與子同夢莫與孤鸞别鶴知陶淵明詩知我逺来意取琴為我彈上弦驚别鶴下弦别孤鸞莊子畢弋之智多則鳥亂於上矣清明遊陳氏園亭村村花栁暗晴川百五時光過客然緑暗園林尚佳節清明亭館自新煙喜逢熟食傳遺俗怕着新衣學少年惆悵東欄花似雪人生底處勝樽前書近事振鬛長鳴衆馬瘖回思當痛若為禁世無直道深藏舌歸擇清流重洗心雪日固無傷吠犬羽毛幸免作湯禽非非是是無庸辯側聴林間快活吟送學録林良佐秩滿歸侍冷官暖况有誰知乗興而来興盡歸薄俸儘堪供瘦馬褐衫未必勝斑衣三年泮水芹無味八月秋風蓴正肥紫帽翠壺纔接壤相思莫遣寸心違宗正為冷卿以其管玉牒所衛尉為煖卿以其管儀鸞供帳糖霜東蜀梓州有糖霜而廣南亦有之春餘甘蔗榨為漿色弄鵞兒淺淺黄金掌飛仙承瑞露板橋行客履新霜攜来已見堅氷漸嚼過誰傳餐玉方輸與雪堂老居士牙盤瑪瑙妙稱楊百里奚妻間闗二國鬢成絲别去齊眉豈復知飯犢已登軒冕貴烹雌誰憶扊扅炊凄涼空作孤鸞操惆悵都忘五羖皮寄語諸公求利達幸毋遺訕及妻兒晉獻公虜虞公與大夫奚以為秦穆公夫人媵奚亡走奔宛楚人執之穆公聞其賢以五羊皮贖之與語國事大恱之授以國政云病起不覺離群旬浹間諸生驚顧瘦欒欒浮雲蔽日身為累止水無波心自安晉載記云不見雀来入燕室但見浮雲蔽白日白樂天贈元㣲之無波古井水有節青琅玕之句甘寢有誰嘲廢學苦吟無味勸加餐指揮牕外閑童子戯瓦先除古井瀾楞嚴經月光童子白佛言我作水觀室中安襌有弟子窺牕惟見清水取一瓦礫投水我出定後頓覺心痛爾時童子来前說如上事我則告言汝今見水可除去瓦礫童子奉教入定時開門除之我從出定身即如初題毛女像避世逃秦去不歸見之時有獵中師飢腸所寄松為食寒骨偏紉槲作衣雲鬢鬅鬙非寵日花容顦顇在宫時隨風飄蕩知何限似爾操心良獨稀列仙傳須于食栢實偓佺食松實懶何心將相與王侯放浪形骸某水丘韓送楊少尹序歸指其樹曰某樹吾先人之所種也某水某丘吾童子之所釣逰也勘破世情如塞馬略同心事僅沙鷗傾身障簏成何事晉祖約好財阮孚性好屐客有詣約正料財物屏當不盡餘兩簏着背後以身障之或詣孚正自蠟屐歎曰未知一生着得幾䩫神色自若開口飲醇良自謀坎止流行隨所寓此身天地一虚舟手談金人謹嘿口三緘家語孔子觀於周廟右階之側有金人三緘其口而銘其背曰古之謹言人也時事祗應付手談垓下騎圍知項走南陽檄定笑劉龕揚子重黎或問義帝初矯矯舉也初舉兵也劉龕南陽髙祖取南陽項救河北二方分崩一離一合漢圍項羽於垓下羽起飲帳中有美人姓虞氏羽悲歌慷慨美人和之黙推攻守籌應熟坐閱興亡戰自酣安石此時先意會故將别墅付羊曇心畫周禮保氏教國子六書一指事二象形三形聲四會意五轉注六假借形聲揚子書心畫也心畫形君子小人見矣六書之學不流傳心畫烏知所以然依類象形求意會左規右矩戒情遷蔡襄楷法人加敬張旭行書世號顛心正格君須有道當年筆諫有誠懸穆宗即位栁公權以夏州掌記入奏帝曰我於佛寺見卿筆蹟久矣即拜翰林侍書學士穆宗問筆法對曰心正則筆正上為改容知其筆諫也陪東泉郡公作霖料院雨登檝江水亭峩峩髙閣臨江渚千古驚濤拍石磯瓦棟龜魚知客至水天霞䳱背人飛奔流電激玻瓈碎㶑灧風生杖屨㣲文采風流舊朝士岳陽景物尚依依韓退之巴陵岳陽樓别竇司直庠唱和䕃杜詩瓦影龜魚次周介福陳仲敷拉遊烏石山韻聞道詩来仔細看知君聨騎共遊山才髙不在歐蘇下國小難居齊楚間間氣不隨豪傑盡和歌始覺性情慳故家天目猶無恙何日相期執手還仙邑雙林温泉與館所相距數里予老不欲徃因想像為賦髙唐鴻蒙喣氣妙氲氤槐火焚脉脉新脫兔知非機上肉孫子九地篇始如處女敵人開户終如脫兔敵不敢拒驚魚幸免釜中鱗滌瑕要識隂陽炭解凍能回澗谷春得似舞雩童冠日不妨也作浴沂人送窮發軔祗携一束書可堪排笑有捓揄韻作撕􅀈又邪揄注舉手相戯得非其道不去也贈若以文幾諂乎韓謂五窮隨暑濕栁云六極屏荒隅賦文送逐毋庸悔獨欠欷歔戯大儒韓送窮文栁逐貧賦聞杜鵑竄伏窮荒徃事非邇来何事與心違空山信宿歌有客故國凄涼賦式㣲詩有客宿宿有客信信注一宿曰宿再宿曰信式㣲式㣲胡不歸芳草斷魂終惜别嫣紅啼血欲安歸多情何似烏衣客盡日茅簷傍主飛蜜蜂閒倚闌干春晝長逰蜂几案竊殘香經營為國心徒赤辛苦無官腰自黄舊制學士以上並有一人朱衣引馬服帶用黄金而無魚入兩府則朱衣雙引金帶懸魚謂之重金世傳館閣望為學士詩眼前何日赤腰下甚時黄及為學士詩云眼赤何時兩腰黄幾日重故云不避雨風終日出長隨潮汐兩衙忙風簷乳燕將黄口要汝充飢慎自防家語孔子得羅雀所得皆黄口小雀曰大雀善驚難得小雀貪食易得西山晚對頗爽氣偶成一首扇搖落日漸昏黄目送棲鵶接翅忙宇宙山川明歴歴古今賢哲逝茫茫悲歌拄笏追陳跡長嘯携笻逗晚涼擘劃戴符錢十萬吾生從此足徜徉晉書桓冲謂王徽之曰卿在府日久比當相料理徽之初不答直髙視以手版拄笏云西山朝来頗有爽氣耳此作在於十年之前今當夀域於此可謂詩䜟幽居一向山公謝不才悄無俗士踏蒼苔舊書餘草風搜遍好樹開花月送来老境道心殊覺長盛年客氣已全灰虚廊徙倚無聊賴時復呼兒貰一杯吾廬不競錐刀不近名野人逸興在林坰琴臺側畔窺明鏡甕牖中間列畫屏扶老過鄰携鶴膝乗閒教子讀牛經青銅三百買一斗自醉有時還自醒劉禹錫詩沈舟側畔千帆過杜速宜相就買一斗恰有三百青銅錢樹寗戚相牛經陳簡齋詩相牛豈無經種亦有書東牕小酌赤丸白璧走西東眼底兒童忽作翁楚漢果云誰得失曹劉若箇是英雄一樽徑醉何妨我萬事隨宜但酌中雨過前湖陂水滿披衣且去理孤篷止酌幾人躭酒失驕慵可怪香山作酒功香山白居易作酒功頌謬誤豈宜溲殿上東方朔傳朔因醉入殿小遺殿上劾為庶人沈酣誰遣入褌中矢辭所見耽狂藥晉孫季舒與石崇酣酒傲慢過度崇欲奏之裵楷謂曰足下飲人以狂藥責人以正理不亦乖乎重罰應須出羖童詩抑詩由醉之言俾出童羖自是今朝真止矣不成世只有陶公夜讀燒松明晝誦何如夜誦専幸然新禁弛松煙茂真封岐王以地狭賦薄下令㩁油禁城門毋納松薪以其可為炬也有優者誚之曰臣請併禁明月茂真笑而不怒銅盤流㶆焚膏木香㶆松瀝也出本草注東坡詩香㶆流銅盤竹簡勞形校蠧編徃訓難明前緒墜古今不死此心傳齊奴薪蠟豪相尚深院呼盧未肯眠石崇小字齊奴與貴戚王愷羊琇等以奢相尚以飴沃釜以蠟代薪艾天師端午人家或以艾為天師像置之門上以辟邪氣飛符走墨浄妖氛誦五千言道徳尊稽首星辰辭玉局漢桓帝永夀元年益州城南湧出玉局座托身蒿艾上朱門綵絲牢繫佳人臂短些難招屈子魂孔户知無邪可辟治書餘暇笑開樽漢有治書侍御史後持書酒熟戱作問天吾道幾時行賣與光隂等踐更漢書卒更踐更過更古者正卒無常人皆迭為之一月一更此卒更也富者僱貧者月二千此踐更也天下皆直戍邉三日雖丞相子亦在調不可人代徃又行者不過三日便還因一嵗一更諸不行者出三百錢入官官以給戍者此過更也小杓夜瓶寒有力大江春水滑無聲幾何鐺足需炊熟已向刀頭卜去程却悔芸人成底事長年谷口廢兒耕鄭子真耕於谷口真名朴醉鄉二首此鄉曠蕩邈無垠土氣和平厚以醇但見八荒皆我闥誰知四體是人身為賢為聖安時論清酒為聖人濁酒為賢人無愛無憎樂性真莫道温柔能益老請君擇里必親仁趙飛燕外傳飛燕女娣名合徳成帝幸合徳謂為温柔鄉曰吾老是鄉足矣不能效武皇白雲鄉醉鄉話靶近詼諧亦有先生為此来劉伯倫酒徳頌有大人先生以天地為一朝萬期為須臾謁帝本求為酒郡皮日休詩他年謁帝言何事請續劉伶作醉侯禮賢更要築糟臺李白襄陽歌云此江若變作春酒壘麯便築糟丘臺頌傳居易何加矣記辱無功亦偉哉無功隋大儒王通之弟甞作醉鄉記况值清時無户稅與君執手且銜盃七月初六夜翫河漢作星燈月燭兩熒煌上界神仙事正忙河鼓明朝開綺席天孫今夜試新粧遙憐凡聖皆如戯或說朦朧似未詳却笑羣兒争拊缶鈞天豈是欠宫商史記趙簡子寤語大夫曰我之帝所甚樂與百神逰於鈞天廣樂九奏萬舞不類三代之樂莆田王主簿館予祖居未曽覿面府委游洋覆實宿予館所小詩奉簡山谷縈行勢似蛇藤蘿深處見人家大賢端若鸞棲棘小卒恬無犬吠花捧檄周旋嚴所指按圖審覈斷無差此行不至空歸去已識江州老孟嘉禇裒有器識庾亮大㑹州府人士孟嘉坐次甚逺裒問江州有孟嘉其人何在亮曰在坐卿但自覺裒歴觀指嘉謂亮曰此君小異将無是乎亮欣然而喜裒得嘉雞豚社提要録社公社母不食舊水故社日必雨謂之社公雨陸龜蒙詩云幾㸃社公雨一番花信風田翁逼社喧鼓鼙携糕送酒遍東西土公志喜催行雨鄰叟相扶盡醉泥雞唱茅茨生事足蠶眠曲箔女紅齊漢景帝紀錦繡纂組害女紅者也董䇿奪園夫紅女之利問天乞得時官好隨分山林儘可棲朱千户自京歸幾年食玉桂為薪不染京華一㸃塵孤鴈旅懐沙漠雪蹇驢詩思灞橋春紆朱喜換頭銜舊衣錦榮歸鬢髪新海宴河清予日望與君同作太平人國䇿蘇秦之楚三日乃得見王辭行王曰曽不少留對曰楚國食貴于玉薪貴于桂謁者難得見如鬼王難得見如天帝今臣食玉炊桂因鬼見帝王曰聞命矣灞或問鄭綮詩思綮曰詩思在橋雪中驢子上辛夘春仲子鼎以銖絫之貲粗營朱紫坊方僉判舊廬為翁媪終老之計予嘉其志為賦八句誌喜宋咸平間巷北巷南四十年卜居朱紫此輝聨杜詩我居街南子巷北十日不一見顔色世途如許誰三讓吾道非邪竟九遷史記孔子圍於陳蔡召子路而問曰詩云匪兕匪虎率彼曠野吾道非耶吾何為於此予離羣索居已九遷矣老屋茍安何陋有穉孫雖晚亦欣然問天但乞身强徤餘事都拈在一邉儔孫辛夘二月初六日己時生甲午九月病中聞廣化寺為贛泉賊人所殘枕上書事烽火連年膽氣摧張天飛焰盡炲煤從来岐路多悲泣楊朱望岐路而悲可以南可以北似此禪宫亦刼灰群醜儘多𠢐面去渠魁更看斫頭来又添一様新人物韓信張良豈異哉望月百年鼎足又逢秋欲掩西牕更少留要看蛾眉圓似鏡絶憐兔魄曲如鉤豪来捉海供吞吸醉後呼天共唱詶更待一輪光滿夜重擕􅙩醁上南樓龍城録魏左相能治酒其名有􅙩醁翠濤常以大金􅎆盛十年味不敗太守常賜詩醽醁稱蘭生翠濤過玉薤千年醉不醒十年味不敗蘭生漢武帝百味㫖酒竹䶉未讓鴟夷說滑稽滑亂也稽同也便捷之人言非若是言是若非亂異同也揚雄酒箴云鴟夷滑稽腹如大壺常為國器托於属車東坡詠竹䶉云鴟夷讓圓滑渾沌漸瘦矣生於野徑雜山蹊香肌圓滑西施乳膏腹彭亨仲頴臍九死不辭羞几肉離騷亦余心之所羡兮雖九死其未悔一生無負飽茅荑回思食鴈有何好笑殺將軍識自低度遼将軍皇甫規解官歸安定鄉人以貨得鴈門太守亦去職還家書刺謁見規卧不迎既而入問曰卿在郡食鴈美乎有頃吏又白王符在門規素聞符名乃驚懼而起衣不結帶屣履出迎援手而還坐極歡時人為之語曰徒見二千石不見一逢掖言書生道義之足貴也春晚同數客遊靈巖廣化寺書所見塔外青山匝四圍澗邉流水繞松扉白雲一塢僧長住紅杏數枝春漸歸雨足人牛耕曠野山深鳥雀哢晴暉長廊響屧皆明禁口自忘言心自非客中過重九半百光隂似箭催瘦笻那更陟崔嵬幸然白髪饒人得遮莫黄花䟎客開擬把琴書先擺撥不妨詩酒恣裴徊陶兒自可籃輿舉莫管王宏来不来陶傳九月九日無酒宅邉有菊採之盈把坐其側久之望見白衣人至乃宏送酒便就酌酒醉而後歸辛夘營郡西夀域二壙小詩誌喜皆仲子之費遂良鬚鬢久成翁大塊勞形一夢中禇河南帖云遂良即日鬚鬢盡白莊子大塊勞我以生而佚我以老山費已償錢百萬戴符甞乞買山錢于于頔頓與百萬求南史王秀之為晉平太守期年便去曰吾山資已足豈可久妨賢路墟聲只隔瀼西東瀼水在夔州奉節縣楚俗謂水之可涉者為瀼杜詩瀼西瀼東一萬家甫甞居瀼西後復居瀼東云浮名何有卿郎異宋璟傳甞宴朝堂張列三品璟階六品居下座易之諂事璟虚位揖曰公第一人何下座璟曰才劣位卑卿謂第一人何耶是時朝廷以易之等内寵不名某官呼易之五郎昌宗六郎鄭善果謂璟曰公奈何謂五郎為卿璟曰以官正當為卿君非其家奴何郎之有大覺須將旦夜同莊子人有大覺而後知其此大夢也莊子太宗師死生命也其有夜旦之常天也碣石大書作村校靦然猶不愧三洪聴賈婦琵琶四絃無語掩胸彈紫錦雙條淚未乾心促不調絃索慢指柔欲控琵琶難酒船屢換春酣宴銀燭髙燒夜向闌欲問烏孫有遺譜惜無賢者仕伶官樂譜琵琶有轉闗六么濩索梁州等曲皆其名也司洪容齋隨筆載樂天以司字作入聲讀四十着緋軍馬男兒官職未蹉蛇一為軍司馬三見嵗重陽又以相字作入聲為問長安月誰教不相離相字自注云思必切以十字作平聲在郡三百日入山十二回又緑浪東西南北路紅欄三百九十橋是也以琵琶作入聲四絃不似琵琶聲亂寫真珠細撼鈐忽聞水上琵琶聲是也朱褒亦有絶句云昨日施僧裙帶上斷腸猶帶琵琶絃唐人亡者遇七日則以魂衣施僧云楊妃琵琶以邏逤檀為槽龍香板為撥張録事克明席間賦墨梅凍裂孤山雪作堆招魂短些待誰来無文與可烏知月有楮先生合伴梅疎影蚤知争膾炙素衣應悔染塵埃新歡已飽張侯徳佳句誰堪共謝裁前賢詩有便無文與可不有月傳神之句塵姜侯徳見杜集姜少府設鱠詩京陸士衡京洛多風素衣染為緇謝眺詩誰能久洛緇塵染素衣容唐杜如晦傳憲物典率二人謝裁荳粥南山收併兩三區食力無慚供曉餔甘味加飴滑似瀡香粳勝玉輭如酥季倫方法咄嗟辦石季倫作荳粥咄嗟便辦蓋豫作熟荳客至但煑白粥方法見杜詩文叔艱危頃刻蘇後漢馮異傳字公孫王郎起光武自薊東南馳晨夜草舎至饒陽蕪蔞亭時天寒冽衆皆飢寒異上豆粥明旦光武謂諸将曰昨得公孫豆粥飢寒俱解至南宫遇大風雨光武卧車入道傍舎異抱薪鄧禹爇火光武對竈燎衣異復進麥飯渡滹沱河至信都大杓吾儂分口數熈熈鼓腹恣歡呼暑雨炎赫難堪暑氣袢令人嚬蹙廢加餐驕陽故作三秋熱甘澤能令六月寒溝澮惔焚皆蕩滌川原霡霂免焦乾一番涼思来牕几贏得披吟到夜闌橙黄甘陸吉未經霜喜見團圓闕寸黄任土不隨淮海貢開苞便壓洞庭香侑樽頓覺杯盤爽薰袖偏宜篋笥藏實在南州成底事金門早入近恩光杜詩後於桃李熟終得近恩光書倭人摺疊扇異域憎憐或不通云胡寒暑此心同卷舒黙寓行藏意繪畫深知采色工范筆何妨書大暑規塵莫遣汙清風晉王導傳王導與庾亮俱相晉而亮獨専權朝廷導心惡之導每遇西風起甞以扇障面曰元規塵汚人亮字元規銀光倘可求番幅溟漲堪供筆力雄黜官書以誡世未會羊腸世路艱居家那得比居官布衣差勝軒裳好食禄何如田畝安狹世出門如有礙達人當道但從寛前修法語君知否留取功名久逺看後漢逸民傳劉表謂龎公曰先生苦居畎畝而不肯官禄後世何以遺子孫曰世人遺之以危吾獨遺之以安未甞無所遺唐書陽城為道州刺史以家人法待吏人宜罰者罰之宜賞者賞之林提舉子木序予軒渠續集小詩奉謝飽飯曽聞細和陶續鳬斷鶴笑徒勞莊子駢拇鳬脛雖短續之則憂鶴脛雖長斷之則悲斵輪幸有家傅在莊子天道齊桓公讀書於堂上輪扁斵於堂下扁曰臣也以臣之事觀之徐則甘而不固疾則苦而不入不徐不疾得之於手而應之於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老於斵輪澼絖争如水戰髙莊子逍遙逰夫子固拙於用大矣宋人有善為不龜手之藥者世世以洴澼絖為事客聞之請買其方百金聚族而謀曰我世世為洴澼絖不過數金今一朝而鬻百金請與之客得之以說吳王越有難吳王使之将冬與越人戰大敗越人裂地而封之能不龜手一也或以封或不免於洴澼絖用之異也魏勃勇人猶惴慄前漢灌嬰聞魏勃本教齊王舉兵使使召責勃勃曰豈有人家失火先召大人而後救之因退立而戰慄嬰視勃曰人言勃勇庸妄人耳麻姑妙手若爬搔神仙傳王方平過蔡經家飲呼麻姑而至經見麻姑指爪長心自念得以爬背為佳方平已知之怒其凡也乃輒如此遂呼鞭空中擊之曰吾鞭不妄施意令悔過也姑杜牧詩韓自詩杜集愁来讀似倩麻癢處搔憐曹檜成邦陋檜羔裘素冠隰有萇楚匪風四詩曹蜉蝣候人鳴鳩下泉四詩前賢詩君如大國梵吞五湖三江我詩如曹檜淺陋不成邦深辱明公一字褒公羊傳序一字之褒寵甚於華衮之贈壬辰冬十一月官築城垣罷吏梁賊者起衆墳石而築之將西山十八大夫墳西畔國諭公墳開穴見棺訟之于路呈諸郡公壬辰乃元順帝至正十二年卜兆城西二百年雍門興感涕澘然桓潭新論曰雍門周以琴見孟甞君曰臣竊悲千秋萬嵗後墳墓生荆棘狐兔穴其中樵童牧豎躑躅其上而歌行人見之悽愴曰孟甞君之尊貴如此如此乎孟甞君喟然歎息淚下承睫時人悲之凄其死者無歸地羞與讐人共戴天記曲禮父之仇弗與共戴天兄弟之讐不反兵交逰之讐不同國古塜亨衢多取石單民弱户亦科錢國朝典制明如鏡願賜推恩及九泉呈袁經歴隂主其事公道權衡執法平穴人墳墓事非輕水丘盡是釣遊處韓送楊少君序楊侯歸指其樹曰某樹吾先人所種也某水某丘吾童子之所釣逰也以不去其鄉為法雨露寧無悽愴情記祭義風雨霜露必有焄蒿悽愴之情附勢假威從計得史百獸畏虎非畏狐也非畏昭奚恤畏楚王甲兵也揚眉吐氣待時清李白與韓朝宗書云云何惜階前盈尺之地不使白揚眉吐氣激昻青雲耶山禽謾不知人事句句哥哥怎解行梁賊為郡公所榜擊郡士庶咸稱快焉仍令重新墳墓以杜其詞小詩誌喜示諸子姪輩郡公馮怒迅雷振東都賦馮怒雷振音平征搒擊姦兇見若神幾世鍊形遭一厄酉陽雜俎載有掘地遇石函發之見人方偃仰容色如生須臾振髪而起即失所在方士云此太隂鍊形人也百年真宅要重新滕公夏侯嬰甞駕至東都門馬悲鳴踣地得石槨有字曰佳城鬱鬱三千年見白日吁嗟滕公居此室雲仍忍辱甘藏舌父子銜寃獨奮身周魯他年拜前後庶幾無愧塜中人公羊傳曰周公何以稱大廣于魯封魯公以為周公也周公拜乎前魯公拜乎後爾雅子之子為孫孫之子為曽孫曽孫之子為𤣥孫𤣥孫之子為来孫来孫之子為晜孫晜孫之子為仍孫仍孫之子為雲孫註云輕逺如浮雲也甲午再經理井亭室自朱紫荆扉且移居城南壯無尤怨老無嫌贏得鬚眉白雪添栗里石田蕪穢久東屯茅屋徃来兼陶歸去来辭田園将蕪胡不歸留杜移居東屯茅屋来徃皆茅屋淹為稻畦之句時方多事蛇添足史記陳軫見楚昭陽曰人有遺舎人一巵酒舎人相謂曰畫地為蛇蛇先成者獨飲之一人曰吾蛇先成吾能為之足人奪之曰蛇固無足今為之足非蛇也老甚無能兔失尖閭里况逢飢饉嵗虀鹽麄糲也應甜韓詩兔尖針莫並藏舊扇憶昔相從懐袖中炎雲烈日與君同不曽少變羅紈色為有深藏箧笥功覿面再逢君子日傾心時有故人風誰云憔悴羞相見請問相如頭白翁司馬相如将聘茂陵妾文君作白頭吟以自絶相如感之乃止其畧云清如山上雪皎如雲間月聞君有兩意故来相决絶平生共城中何曽斗酒㑹今日斗酒間明日溝水頭蹀踥向溝上溝水東西流幽蘭芳草推蘭作長雄長身大葉聳叢叢崑崙瓊樹風搖碧勾漏丹砂露滴紅屈子手紉曽作佩淵材鼻塞曷由通僧名淵材前賢詩云淵材無鼻孔信口道無香雖非桃李春風面名在離騷九畹中輓方學録若梅與内子合葬五十餘年一夢新慈親哭囝若為情壻身本是王郎子太平廣記王仙客幼寄舅家唐劉振之甥也舅女曰無雙皆幼穉戯弄相狎時愛憐之振妻常戯呼仙客為王郎子云宅相終期寗氏甥晉魏舒字楊元少孤養外家寗氏寗氏起宅相宅者云當出貴甥外祖母以盛氏甥小而慧意謂之舒曰當為外家成此宅相豈意悲風生玉樹好携明月看蓉城詩話石曼卿卒後今人見之者恍惚如夢言我今為仙主芙蓉城欲與其人逰不得乗青騾飛去封胡羯末皆能世人道寒梅復着英晉謝氏一時彦秀封謝韶胡謝朗羯謝元末謝川喜八同知自温陵回治卿雲又迓使君車卿音慶和氣相傳藹八壺怪底歡聲出芒芴莊子芒乎芴乎無有象乎注造化生物恍惚芒昧音荒忽從来善政敏蒲蘆雲旗獵獵空機杼雷鼓鼕鼕桚路衢千里耄倪都感徳也蒙色笑及吾儒陳畊道先生任廣南恩平巡檢再調韶州案牘莆士夫贈語盈軸書于卷末紛紛海氣接朱垠班固東都賦北動幽崖南耀朱垠注朱垠南岸南望宣溪自此分韓詩韶州南去接宣溪雲水蒼蒼日向西甫也諸侯老賔客杜詩廣云霸尉舊將軍前漢李廣傳煑茶又吸韶陽水拈酒長懐日暮雲杜春日憶李白留與鄉人作佳様好持赤幟植斯文送莆田原道公赴漕司經歴唱徹陽闗酒滿斟以言為贈意彌深盡將學道愛人意散作推誠事長心白草青煙知起竈杜詩汲井嵗潏潏出車日連連鹵中草木白青者官鹽煙紅蓮緑水聴鳴琴弊車羸馬真消息此語名賢傳至今輓仙邑陽山張處士林提舉子木誌其墓勤於生事儉於身婣睦同宗靡間親亟返圭田存伏臘慣分歉粟活鄉鄰人將競睹燕山桂天不憖遺莊氏椿逺寄西風一掬淚為君洒向素車塵丁酉自夀每笑王裒廢蓼莪劬勞子職合如何年過絳縣垂垂老日伴青州皓皓歌懶學時粧隨世好厭將老眼閱人多祝天海宴河清了子父熙熙安樂窩左傳絳縣老人曰臣生之嵗正月甲子朔四百四十五甲子矣師曠曰七十五年矣温僧貫休詩一瓶一鉢垂垂老萬水千山得得来桓有主簿善别酒味好者謂青州從事青州有齊郡飲好酒者直至腹臍惡者謂平原督郵平原有鬲縣言至鬲上住也漢時世粧云時世粧時世粧城中出来傳四方蓋寛饒視屋而歎曰如此傳舎閱人多矣糖霜凳豆鮮明透水晶南州氣煖體寒凝甘香逺敵漢宫露清冽難為凌室氷齒頬一時増爽快襟懐六月解炎蒸玉環昨夜方中酒渇肺相逢喜可勝次韻貫齊萬户輿疾抵莆三閱月有孤憤之作四序榮枯春復秋人生底處獨無愁班班忠孝有如此衮衮公侯来未休鵷鳳固宜抛腐䑕族良未始見全牛凌烟正觀多勲舊萬古箕山一許由唐太宗正觀中圖功臣二十三人凌烟閣上帥貫齋甞棄官為道士後漳江有警息閫令出征抵莆喑嘿不能言新秋客中一望澄江欲盡頭鄉闗斷絶使人愁江山遼邈英雄老河漢微茫天地秋蛩助吟聲風淅淅鴈傳客信水悠悠眼前有句懐王粲煙樹重重倦倚樓呈盧照磨元統間歴仙逰教諭又歴泉州教授博士三年坐絳紗諸生館下論無譁禮羅温石得名士韓送河陽節度烏公序官族崔盧是世家詳見朱陳村詩註瘦馬重来暗舊路緑池晚對冒朱華曹子建詩自憐不俊淹廊廡獨抱遺經閱嵗華贈徐邦獻館吳塘東道主郭氏奎星絢爛燭天明喜子韶年見太平蠶繭紙中留墨蹟沈香火底着書聲竹風拂席吟懐暢梅月横牕客夢清特起詩書欣有托令人慨歎憶徐卿謂徐尉文仲甞從先人㳺送林信玉館仙溪祖父通家道本同夜牕燈火徃来通聨登桂籍芳猶在初筮桐鄉愛未終前漢朱邑字仲卿病且死属其子曰我故桐鄉吏其民愛我必葬我桐鄉後世子孫奉甞我不如桐鄉民其父甞為仙溪尉故云我老斯文猶可與子行吾道已云東為言坎井偶然耳否泰相仍豈有窮庚子兒生孫倫小詩誌喜庚子丙戌甲子丙寅年過八􅐆夀耆頤喜氣重重我自知鶴髪滿簪留老眼龍鐘扶杖看孫枝山川氣數時當復父祖詩書澤未衰異日成名身外事且呼樽酒且吟詩自和生孫韻鶴誕須觀胎化時長鳴戛戛九臯知瑞蓂恰好開千葉仙桂初看放一枝意有可人供一笑髪無到耳未全衰挑燈更作蠅頭字自和生孫誌喜詩杜詩白頭亂髪垂到耳小孫倫試晬戯贈八句仙桂飄香浄灑塵天風吹下玉麒麟詩書固是吾家事門地無慚汝後人义手低頭長作揖挽鬚坐膝孰能嗔祝倫長大破萬卷獻賦當為席上珍禮史儒為席上之珍以待聘壬寅冬十一月誕次孫阿任小詩誌喜二難兄弟未甞無願祝兒孫善友于共羡明珠生老蚌尚容餘齒看於菟詩述好懐呈佛出酒逢佳客向鄰酤亟喚陟釐濡葛筆便書樂論付官奴本草陟釐陶隠居云此即南人所用作紙者唐本註云此物乃水中苔今取為紙音陟釐與側黎相近側黎又與側理相近又云即石髪也周鉞法書苑云王獻之字子敬羲之第七子五六嵗時學書羲之從後掣其筆不脫歎曰此兒後當有大名遂書樂毅論一篇與之後題云書賜官奴能宣州諸葛氏能作筆栁公權求之不能用惟王右軍用之故世有曰非右軍不能用諸葛筆也東坡云宣州諸葛氏筆擅天下其間不甚佳者終有家法官奴子敬小字十一月廿三日夘時八字壬寅甲子甲子丁夘續軒渠集卷六
